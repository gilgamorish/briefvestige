                const h = store.get(HIST_KEY); if (h) { try { setHistory(JSON.parse(h)); } catch { } }
                // Inject saved custom entries + load pins
                try { const cd = JSON.parse(store.get(CUSTOM_KEY) || '{}'); Object.keys(cd).forEach(k => { if (W[k] && cd[k].length) W[k] = [...W[k], ...cd[k]]; }); } catch(e) {}
                try { const pd = JSON.parse(store.get(PIN_KEY) || '{}'); Object.keys(pd).forEach(k => { _pins[k] = pd[k]; }); } catch(e) {}
                // Show whats new if not seen this version
                if (store.get('wn_seen') !== WHATS_NEW_VERSION) setWhatsNew(true);
                AMBIENT.init();
                setLoaded(true);
            }, []);
            useEffect(() => { if (loaded) store.set(STAR_KEY, JSON.stringify(starredBriefs)); }, [starredBriefs, loaded]);
            useEffect(() => { if (loaded) store.set(HIST_KEY, JSON.stringify(history.slice(0, 100))); }, [history, loaded]);

            // Keyboard shortcuts
            useEffect(() => {
                function onKey(e) {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (e.key === 'r' || e.key === 'R') { gen('char'); gen('env'); }
                    if (e.key === 'u' || e.key === 'U') { handleUndo('char'); handleUndo('env'); }
                    if (e.key === 'c' || e.key === 'C') handleCombine();
                    if (e.key === 's' || e.key === 'S') {
                        const id = lastHistId.char || lastHistId.env;
                        if (id) starHistoryItem(id);
                    }
                }
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [results, locks, undoStack, lastHistId]);

            function toggleLock(cardKey, fk, val) {
                SFX.play('lock');
                setLocks(prev => { const c = { ...prev[cardKey] }; if (c[fk]) delete c[fk]; else c[fk] = val; return { ...prev, [cardKey]: c }; });
            }
            function addToHistory(type, name, data, cardKey) {
                const id = Date.now();
                setHistory(h => [{ id, ts: id, type, name, data, starred: false, rating: 0, note: "" }, ...h].slice(0, 100));
                if (cardKey) setLastHistId(l => ({ ...l, [cardKey]: id }));
            }
            function starHistoryItem(id) {
                SFX.play('star');
                setHistory(h => h.map(i => {
                    if (i.id !== id) return i;
                    const ns = !i.starred;
                    if (ns) setStarredBriefs(sb => sb.find(s => s.id === id) ? sb : [{ ...i, starred: true }, ...sb]);
                    else setStarredBriefs(sb => sb.filter(s => s.id !== id));
                    return { ...i, starred: ns };
                }));
            }
            function rateHistoryItem(id, rating) {
                setHistory(h => h.map(i => i.id === id ? { ...i, rating } : i));
            }
            function noteHistoryItem(id, note) {
                setHistory(h => h.map(i => i.id === id ? { ...i, note } : i));
            }
            function unstar(id) { setStarredBriefs(sb => sb.filter(s => s.id !== id)); setHistory(h => h.map(i => i.id === id ? { ...i, starred: false } : i)); }

            function rerollField(cardKey, fk) {
                const W_map = {
                    job: () => pickPinned("jobs", W.jobs), race: () => pickPinned("races", W.races),
                    genre: () => pickPinned("genres", W.genres), theme: () => pickPinned("themes", W.themes),
                    culture: () => pickPinned("cultures", W.cultures), pillars: () => picksPinned("pillars", W.pillars, 3).join(", "),
                    shape: () => pickPinned("shapes", W.shapes), colors: () => picksPinned("colors", W.colors, 2).join(", "),
                    materials: () => picksPinned("materials", W.materials, 2).join(", "), prop: () => pickPinned("props", W.props),
                    worn: () => pickPinned("worn", W.worn), buildingType: () => pickPinned("buildingTypes", W.buildingTypes),
                    function: () => pickPinned("envFunctions", W.envFunctions), biome: () => pickPinned("biomes", W.biomes),
                    condition: () => pickPinned("conditions", W.conditions), scale: () => pickPinned("scales", W.scales),
                    color: () => pickPinned("colorScripts", W.colorScripts), hero: () => pickPinned("heroProps", W.heroProps),
                };
                const fn = W_map[fk];
                if (!fn) return;
                SFX.play('roll');
                setResults(r => ({ ...r, [cardKey]: { ...r[cardKey], [fk]: fn() } }));
            }

            function gen(key) {
                SFX.play('roll');
                const prev = results[key];
                const d = key === "char" ? genChar(locks[key]) : genEnv(locks[key]);
                const type = key === "char" ? "character" : "environment";
                const histName = d._histName || d.job || d.name;
                setUndoStack(u => ({ ...u, [key]: prev }));
                setResults(r => ({ ...r, [key]: d }));
                addToHistory(type, histName, d, key);
                setCombined(null);
            }

            function handleUndo(key) {
                const prev = undoStack[key];
                if (!prev) return;
                setResults(r => ({ ...r, [key]: prev }));
                setUndoStack(u => ({ ...u, [key]: null }));
            }

            function handleCombine() {
                SFX.play('roll');
                const char = genChar(locks.char);
                const env = genEnv(locks.env);
                const charHistName = char._histName || char.job;
                const envHistName = env._histName || env.name;
                setResults({ char, env });
                setUndoStack({ char: results.char, env: results.env });
                addToHistory("character", charHistName, char, "char");
                addToHistory("environment", envHistName, env, "env");
                setCombined({ char, env });
            }

            function handleCopy(key, type) {
                const d = results[key]; if (!d) return;
                copyBrief(type, d);
                setCopied(c => ({ ...c, [key]: true }));
                setTimeout(() => setCopied(c => ({ ...c, [key]: false })), 1500);
            }

            function handleSoundToggle() {
                const on = SFX.toggle();
                setSoundOn(on);
                if (on) SFX.play('star');
            }
            function handleAmbientToggle() {
                const on = AMBIENT.toggle();
                setAmbientOn(on);
            }
            function handleShare(key) {
                const d = results[key]; if (!d) return;
                const url = getShareURL(d);
                if (url) navigator.clipboard.writeText(url).catch(() => {});
                setShareCopied(s => ({ ...s, [key]: true }));
                setTimeout(() => setShareCopied(s => ({ ...s, [key]: false })), 2000);
            }
            // On load, check for shared brief in URL
            React.useEffect(() => {
                const hash = window.location.hash;
                if (hash && hash.startsWith('#brief=')) {
                    const d = decodeBrief(hash.slice(7));
                    if (d && d.job) setResults(r => ({ ...r, char: d }));
                    else if (d && d.buildingType) setResults(r => ({ ...r, env: d }));
                    window.history.replaceState(null, '', window.location.pathname);
                }
            }, []);

            const CARDS = [
                { key: "char", type: "character", num: "01", title: "Character", badge: "char brief", desc: "role, race, genre, theme, culture, shape, colors, materials", BC: CharBrief },
                { key: "env", type: "environment", num: "02", title: "Environment", badge: "env brief", desc: "role, biome, genre, culture, shape, materials, hero prop", BC: EnvBrief },
            ];
            const filteredHist = history.filter(h => {
                if (histFilter === "all") return true;
                if (histFilter === "starred") return h.starred;
                if (histFilter === "liked") return h.rating === 1;
                return h.type === histFilter;
            });

            if (!loaded) return <LoadingScreen onDone={() => setLoaded(true)} />;

            return (
                <>
                    {tour && <Tour onClose={() => setTour(false)} />}
                    {whatsNew && <WhatsNew onClose={() => setWhatsNew(false)} />}
                    {customWords && <CustomWords onClose={() => setCustomWords(false)} />}
                    <StatusBar tab={tab} history={history} soundOn={soundOn} onSoundToggle={handleSoundToggle} ambientOn={ambientOn} />
                    <div className="app">
                        <div className="header">
                            <div style={{display:"flex",alignItems:"center",gap:"1rem"}}>
                                <svg width="50" height="50" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg" style={{flexShrink:0}}>
                                    <polygon points="26,2 50,26 26,50 2,26" fill="none" stroke="#C8A050" strokeWidth="1.5"/>
                                    <polygon points="26,9 43,26 26,43 9,26" fill="none" stroke="#C8A050" strokeWidth="1" opacity="0.45"/>
                                    <polygon points="26,16 36,26 26,36 16,26" fill="none" stroke="#C8A050" strokeWidth="1" opacity="0.28"/>
                                    <line x1="26" y1="2" x2="26" y2="50" stroke="#7A6028" strokeWidth="0.5" opacity="0.35"/>
                                    <line x1="2" y1="26" x2="50" y2="26" stroke="#7A6028" strokeWidth="0.5" opacity="0.35"/>
                                    <line x1="6" y1="6" x2="46" y2="46" stroke="#7A6028" strokeWidth="0.5" opacity="0.2"/>
                                    <line x1="46" y1="6" x2="6" y2="46" stroke="#7A6028" strokeWidth="0.5" opacity="0.2"/>
                                    <polygon points="26,21 31,26 26,31 21,26" fill="#C8A050"/>
                                    <circle cx="26" cy="2" r="1.8" fill="#C8A050"/>
                                    <circle cx="50" cy="26" r="1.8" fill="#C8A050"/>
                                    <circle cx="26" cy="50" r="1.8" fill="#C8A050"/>
                                    <circle cx="2" cy="26" r="1.8" fill="#C8A050"/>
                                    <circle cx="9" cy="9" r="1.2" fill="#7A6028" opacity="0.6"/>
                                    <circle cx="43" cy="9" r="1.2" fill="#7A6028" opacity="0.6"/>
                                    <circle cx="43" cy="43" r="1.2" fill="#7A6028" opacity="0.6"/>
                                    <circle cx="9" cy="43" r="1.2" fill="#7A6028" opacity="0.6"/>
                                </svg>
                                <div>
                                    <div className="header-eyebrow">concept art studio</div>
                                    <div className="header-title">Vestige <span>/ brief gen</span></div>
                                    <div className="header-combo-count">◆ <strong>{getBriefCombinations()}</strong> possible combinations</div>
                                </div>
                            </div>
                            <div style={{display:"flex",gap:6,alignSelf:"flex-end",marginBottom:"4px",flexWrap:"wrap"}}>
                                <button className={`ambient-btn${ambientOn ? " on" : ""}`} onClick={handleAmbientToggle}>{ambientOn ? "♫ music on" : "♫ music off"}</button>
                                <button className="tour-btn" onClick={() => setCustomWords(true)}>◆ edit banks</button>
                                <button className="tour-btn" onClick={() => setWhatsNew(true)}>★ new{store.get('wn_seen') !== WHATS_NEW_VERSION && <span className="new-dot" />}</button>
                                <button className="tour-btn" onClick={() => setTour(true)}>? how to use</button>
                            </div>
                        </div>
                        <div className="header-rule">
                            <div className="header-rule-line" />
                            <div className="header-rule-glyph">◆ &nbsp; vestige &nbsp; ◆</div>
                            <div className="header-rule-line right" />
                        </div>
                        <div className="tab-bar">
                            <button className={`tab${tab === "generate" ? " active" : ""}`} onClick={() => setTab("generate")}>generate</button>
                            <button className={`tab${tab === "starred" ? " active" : ""}`} onClick={() => setTab("starred")}>starred{starredBriefs.length ? ` (${starredBriefs.length})` : ""}</button>
                            <button className={`tab${tab === "history" ? " active" : ""}`} onClick={() => setTab("history")}>history{history.length ? ` (${history.length})` : ""}</button>
                        </div>

                        {tab === "generate" && (
                            <div>
                                <div style={{display:"flex",gap:8,marginBottom:"1rem",flexWrap:"wrap"}}>
                                    <button className="gen-btn" style={{fontSize:"8px"}} onClick={handleCombine}>◆ combine both ↻</button>
                                    <button className="action-btn" onClick={() => { handleUndo('char'); handleUndo('env'); }} style={{opacity: (undoStack.char||undoStack.env) ? 1 : .35}}>↩ undo last roll</button>
                                </div>

                                {combined && (
                                    <div className="combine-card" style={{marginBottom:"1.25rem"}}>
                                        <div className="combine-header">
                                            <span className="combine-title">◆ combined scene brief</span>
                                            <button className="action-btn" onClick={() => setCombined(null)}>✕</button>
                                        </div>
                                        <div className="combine-scene">
                                            <strong>{combined.char.race ? combined.char.race.split(" —")[0] : ""} {combined.char.job}</strong>
                                            {" inside a "}<strong>{combined.env.buildingType}</strong>
                                            {combined.env.function ? <span> — <em>{combined.env.function.split(" —")[0]}</em></span> : ""}
                                            {". Theme: "}<strong>{combined.char.theme}</strong>{" / "}<strong>{combined.env.theme}</strong>
                                            {". Culture: "}<strong>{combined.char.culture ? combined.char.culture.split(" —")[0] : ""}</strong>
                                            {" meeting "}<strong>{combined.env.culture ? combined.env.culture.split(" —")[0] : ""}</strong>.
                                        </div>
                                        <div className="combine-grid">
                                            <div className="combine-col">
                                                <div className="combine-col-label">character</div>
                                                <div className="combine-col-name">{combined.char.job}</div>
                                                <div className="combine-col-sub">{combined.char.race ? combined.char.race.split(" —")[0] : ""} · {combined.char.genre} · {combined.char.theme}</div>
                                            </div>
                                            <div className="combine-col">
                                                <div className="combine-col-label">environment</div>
                                                <div className="combine-col-name">{combined.env.buildingType}</div>
                                                <div className="combine-col-sub">{combined.env.biome} · {combined.env.genre} · {combined.env.theme}</div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="cards">
                                    {CARDS.map(c => {
                                        const d = results[c.key], cl = locks[c.key], lc = Object.keys(cl).length;
                                        const histId = lastHistId[c.key];
                                        const isStarred = histId ? !!history.find(h => h.id === histId)?.starred : false;
                                        const hasUndo = !!undoStack[c.key];
                                        return (
                                            <div key={c.key} className={`card${d ? " brief-loaded" : ""}`}>
                                                <div className="card-header">
                                                    <div className="card-left">
                                                        <span className="card-num">{c.num}</span>
                                                        <span className="card-title">{c.title}</span>
                                                        <span className="card-badge">{c.badge}</span>
                                                        {lc > 0 && <span className="lock-count">{lc} locked</span>}
                                                    </div>
                                                    <div className="card-actions">
                                                        {d && <button className={`star-btn${isStarred ? " on" : ""}`} onClick={() => histId && starHistoryItem(histId)}>{isStarred ? "★" : "☆"}</button>}
                                                        {d && <button className={`action-btn${copied[c.key] ? " ok" : ""}`} onClick={() => handleCopy(c.key, c.type)}>{copied[c.key] ? "copied ✓" : "copy brief"}</button>}
                                                    {d && <button className={`action-btn${shareCopied[c.key] ? " share-copied" : ""}`} onClick={() => handleShare(c.key)}>{shareCopied[c.key] ? "link copied ✓" : "share ↗"}</button>}
                                                        {hasUndo && <button className="undo-btn" onClick={() => handleUndo(c.key)}>↩ undo</button>}
                                                        {lc > 0 && <button className="action-btn" onClick={() => setLocks(l => ({ ...l, [c.key]: {} }))}>clear locks</button>}
                                                        <button className="gen-btn" onClick={() => gen(c.key)}>roll brief ↻</button>
                                                    </div>
                                                </div>
                                                {d
                                                    ? <c.BC d={d} locks={cl}
                                                        onToggle={(fk, val) => toggleLock(c.key, fk, val)}
                                                        onReroll={(fk) => rerollField(c.key, fk)}
                                                      />
                                                    : <EmptyState desc={c.desc} />
                                                }
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {tab === "starred" && (
                            <div>
                                {starredBriefs.length === 0
                                    ? <div className="hist-empty">nothing starred yet.{"\n"}star any brief and it will persist here.</div>
                                    : <div className="hist-list">{starredBriefs.map(item => <HistItem key={item.id} item={{ ...item, starred: true }} onStar={() => unstar(item.id)} onRate={rateHistoryItem} onNote={noteHistoryItem} />)}</div>
                                }
                            </div>
                        )}

                        {tab === "history" && (
                            <div>
                                <div className="hist-filters">
                                    {["all", "character", "environment", "starred", "liked"].map(f => (
                                        <button key={f} className={`hist-filter-btn${histFilter === f ? " active" : ""}`} onClick={() => setHistFilter(f)}>{f}</button>
                                    ))}
                                </div>
                                {filteredHist.length === 0
                                    ? <div className="hist-empty">{history.length === 0 ? "nothing here yet.\nroll some briefs and they will show up." : "no briefs match this filter."}</div>
                                    : <>
                                        <div className="hist-toolbar">
                                            <span className="hist-count">{filteredHist.length} brief{filteredHist.length !== 1 ? "s" : ""}</span>
                                            <button className="clear-btn" onClick={() => { setHistory([]); store.set(HIST_KEY, '[]'); }}>clear history</button>
                                        </div>
                                        <div className="hist-list">{filteredHist.map(item => <HistItem key={item.id} item={item} onStar={starHistoryItem} onRate={rateHistoryItem} onNote={noteHistoryItem} />)}</div>
                                    </>
                                }
                            </div>
                        )}
                    </div>
                        <footer className="site-footer">
                            <div className="footer-inner">
                                <div className="footer-credit">
                                    <div className="footer-credit-by">created by</div>
                                    <div className="footer-credit-name">Noble Jefferies</div>
                                    <div className="footer-credit-title">Artist / Concept Artist</div>
                                </div>
                                <div className="footer-links">
                                    <a className="footer-link" href="https://www.instagram.com/mr.miracle.art/" target="_blank" rel="noopener noreferrer">Instagram</a>
                                    <a className="footer-link" href="https://www.artstation.com/mr_miracle" target="_blank" rel="noopener noreferrer">ArtStation</a>
                                    <a className="footer-link" href="https://miracleworks.godaddysites.com/" target="_blank" rel="noopener noreferrer">Portfolio</a>
                                    <a className="footer-link" href="https://noblesenvironmentdesignportfol.godaddysites.com/" target="_blank" rel="noopener noreferrer">Env Portfolio</a>
                                </div>
                            </div>
                            <div className="footer-bottom">
                                <span className="footer-copy">open source / free forever / runs offline</span>
                                <span className="footer-version">concept vestigue / v{WHATS_NEW_VERSION}</span>
                            </div>
                        </footer>
                </>
            );
        }
                ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
