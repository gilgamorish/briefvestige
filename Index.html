<html lang="en">

<head>

    <meta name="theme-color" content="#07070E">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="preconnect" href="https://fonts.googleapis.com">

        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg: #07070E;
            --bg-s: #0C0D1A;
            --bg-r: #111220;
            --bg-h: #191A2C;
            --bd: #252640;
            --bd-m: #383A58;
            --tx: #F2EAD4;
            --tx-2: #9A8C6C;
            --tx-3: #4A4638;
            --ac: #C8A050;
            --ac-l: #F0D080;
            --ac-d: #7A6028;
            --ac-bg: rgba(200, 160, 80, .10);
            --ac-bd: rgba(200, 160, 80, .28);
            --blue: #4A90B8;
            --blue-bg: rgba(74, 144, 184, .10);
            --blue-bd: rgba(74, 144, 184, .28);
            --ok: #60A070;
            --ok-bg: rgba(96, 160, 112, .10);
            --danger: #C05040;
            --r: 2px;
            --R: 3px
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--tx);
            min-height: 100vh;
            font-size: 13px;
            overflow-x: hidden
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bd-m)
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(200, 160, 80, .05) 1px, transparent 1px);
            background-size: 36px 36px
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse 70% 50% at 10% 10%, rgba(200, 160, 80, .05) 0%, transparent 55%), radial-gradient(ellipse 60% 50% at 90% 90%, rgba(74, 144, 184, .05) 0%, transparent 55%)
        }

        #starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 5rem
        }

        /* Header */
        .header {
            margin-bottom: 2rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--bd);
            position: relative;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header::before {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 60px;
            height: 1px;
            background: var(--ac)
        }

        .header::after {
            content: '▪';
            position: absolute;
            bottom: -5px;
            left: 58px;
            font-size: 6px;
            color: var(--ac)
        }

        .header-eyebrow {
            font-size: 10.5px;
            letter-spacing: .32em;
            text-transform: uppercase;
            color: var(--ac-d);
            font-family: 'IBM Plex Mono', monospace;
            margin-bottom: 8px
        }

        .header-eyebrow::before {
            content: '[ ';
            color: var(--ac)
        }

        .header-eyebrow::after {
            content: ' ]';
            color: var(--ac)
        }

        .header-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--ac-l);
            line-height: 1
        }

        .header-title span {
            font-family: 'IBM Plex Mono', monospace;
            font-size: .75rem;
            font-weight: 300;
            letter-spacing: .3em;
            color: var(--tx-3);
            vertical-align: middle;
            margin-left: 10px
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--bd);
            margin-bottom: 1.75rem
        }

        .tab {
            font-size: 10.5px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--tx-3);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            padding: .6rem 1.2rem;
            cursor: pointer;
            margin-bottom: -1px;
            transition: all .2s
        }

        .tab:hover {
            color: var(--tx-2)
        }

        .tab.active {
            color: var(--ac);
            border-bottom-color: var(--ac)
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--ac);
            box-shadow: 0 0 6px var(--ac)
        }

        .tab {
            position: relative
        }

        /* Cards */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 1.25rem
        }

        .card {
            background: linear-gradient(160deg, var(--bg-s) 0%, var(--bg-r) 100%);
            border: 1px solid var(--bd);
            border-radius: var(--R);
            position: relative;
            overflow: visible;
            transition: border-color .25s, box-shadow .25s
        }

        .card:hover {
            border-color: var(--bd-m)
        }

        .card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            width: 16px;
            height: 16px;
            border-top: 1px solid var(--ac);
            border-left: 1px solid var(--ac);
            z-index: 2
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -1px;
            right: -1px;
            width: 16px;
            height: 16px;
            border-bottom: 1px solid var(--ac-d);
            border-right: 1px solid var(--ac-d);
            z-index: 2
        }

        .card.brief-loaded {
            border-color: rgba(200, 160, 80, .22);
            box-shadow: 0 0 28px rgba(200, 160, 80, .07)
        }

        .card.brief-loaded::before {
            border-color: var(--ac);
            animation: cg 3s ease-in-out infinite
        }

        .card.brief-loaded::after {
            border-color: var(--ac);
            animation: cg 3s ease-in-out .6s infinite
        }

        @keyframes cg {

            0%,
            100% {
                box-shadow: -2px -2px 5px rgba(200, 160, 80, .1)
            }

            50% {
                box-shadow: -2px -2px 10px rgba(200, 160, 80, .35)
            }
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .75rem 1.2rem;
            border-bottom: 1px solid var(--bd);
            gap: 8px;
            flex-wrap: wrap;
            background: linear-gradient(135deg, rgba(255, 255, 255, .02) 0%, transparent 100%);
            position: relative;
            overflow: hidden
        }

        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--ac-bd), transparent)
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .card-num {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--ac);
            min-width: 24px;
            letter-spacing: .08em;
            background: var(--ac-bg);
            border: 1px solid var(--ac-bd);
            padding: 2px 6px;
            text-align: center;
            box-shadow: 0 0 6px rgba(200, 160, 80, .12)
        }

        .card-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: .95rem;
            font-weight: 700;
            color: var(--tx);
            letter-spacing: .14em;
            text-transform: uppercase
        }

        .card-badge {
            font-size: 9px;
            letter-spacing: .16em;
            text-transform: uppercase;
            padding: 2px 7px;
            border: 1px solid var(--bd);
            color: var(--tx-3)
        }

        .lock-count {
            font-size: 9px;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: 2px 8px;
            background: var(--blue-bg);
            color: var(--blue);
            border: 1px solid var(--blue-bd)
        }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap
        }

        .action-btn {
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .06em;
            color: var(--tx-3);
            background: none;
            border: 1px solid var(--bd);
            padding: 5px 10px;
            cursor: pointer;
            transition: all .13s;
            white-space: nowrap
        }

        .action-btn:hover {
            color: var(--tx-2);
            border-color: var(--bd-m);
            background: var(--bg-h)
        }

        .action-btn.ok {
            color: var(--ok)
        }

        .gen-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: .18em;
            text-transform: uppercase;
            font-weight: 700;
            color: #06060C;
            background: linear-gradient(105deg, #6A500A 0%, #C89838 28%, #F0D070 50%, #C89838 72%, #6A500A 100%);
            background-size: 250% auto;
            border: none;
            padding: 7px 18px;
            cursor: pointer;
            transition: opacity .13s, transform .1s, box-shadow .2s;
            animation: btn-shim 2.5s linear infinite;
            box-shadow: 0 2px 14px rgba(200, 160, 80, .3)
        }

        .gen-btn:hover {
            opacity: .88;
            box-shadow: 0 2px 22px rgba(200, 160, 80, .5);
            transform: translateY(-1px)
        }

        .gen-btn:active {
            transform: scale(.97)translateY(0)
        }

        @keyframes btn-shim {
            to {
                background-position: -250% center
            }
        }

        .star-btn {
            font-size: 16px;
            background: none;
            border: 1px solid var(--bd);
            cursor: pointer;
            color: var(--tx-3);
            padding: 4px 8px;
            line-height: 1;
            transition: all .13s
        }

        .star-btn:hover {
            color: var(--ac);
            border-color: var(--ac-bd)
        }

        .star-btn.on {
            color: var(--ac);
            border-color: var(--ac-bd);
            background: var(--ac-bg)
        }

        /* Brief grid */
        .brief {
            display: flex;
            flex-direction: column
        }

        .brief-section {
            display: grid;
            border-bottom: 1px solid var(--bd);
            opacity: 0;
            transform: translateY(4px);
            animation: ri .3s ease forwards;
            animation-delay: calc(var(--row-i, 0)*50ms)
        }

        .brief-section:last-child {
            border-bottom: none
        }

        .brief-section.c1 {
            grid-template-columns: 1fr
        }

        .brief-section.c2 {
            grid-template-columns: 1fr 1fr
        }

        .brief-section.c3 {
            grid-template-columns: 1fr 1fr 1fr
        }

        @keyframes ri {
            to {
                opacity: 1;
                transform: none
            }
        }

        .brief-cell {
            padding: .65rem 1.1rem;
            border-right: 1px solid var(--bd);
            cursor: pointer;
            transition: background .11s;
            position: relative
        }

        .brief-cell:last-child {
            border-right: none
        }

        .brief-cell:hover {
            background: rgba(255, 255, 255, .025)
        }

        .brief-cell.locked {
            background: var(--blue-bg)
        }

        .brief-cell.locked:hover {
            background: rgba(74, 144, 184, .12)
        }



        .brief-cell.locked:hover::before {
            background: var(--blue)
        }

        .brief-key {
            font-size: 9px;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: var(--tx-3);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'IBM Plex Mono', monospace
        }

        .brief-key::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 1px;
            background: linear-gradient(90deg, var(--ac-d), transparent);
            flex-shrink: 0
        }

        .brief-cell.locked .brief-key {
            color: var(--blue)
        }

        .brief-cell.locked .brief-key::before {
            background: linear-gradient(90deg, var(--blue), transparent)
        }

        .lock-pip {
            font-size: 5px;
            color: var(--blue);
            margin-left: 2px
        }

        .brief-val {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13.5px;
            color: var(--tx);
            line-height: 1.5;
            font-weight: 400
        }

        .brief-val.headline {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--ac-l);
            line-height: 1.1
        }

        .brief-val.pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 3px
        }

        .pillar-tag {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            padding: 3px 10px;
            background: linear-gradient(135deg, rgba(200, 160, 80, .14), rgba(200, 160, 80, .04));
            border-top: 1px solid rgba(200, 160, 80, .32);
            border-left: 1px solid rgba(200, 160, 80, .14);
            border-right: 1px solid rgba(200, 160, 80, .14);
            border-bottom: 1px solid transparent;
            color: var(--ac-l);
            letter-spacing: .12em;
            text-transform: uppercase
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3.5rem 1rem;
            gap: 14px;
            position: relative;
            overflow: hidden
        }

        .empty-state::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(200, 160, 80, .012) 3px, rgba(200, 160, 80, .012) 4px);
            pointer-events: none
        }

        .empty-orb {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        /* SVG orb animations */
        .orb-outer { animation: orb-spin-cw 10s linear infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-mid   { animation: orb-spin-ccw 7s linear infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-core  { animation: orb-breathe 2.8s ease-in-out infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-dot   { animation: orb-spin-cw 10s linear infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-dot2  { animation: orb-spin-ccw 7s linear infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-center{ animation: orb-breathe 2.8s ease-in-out infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-tick  { animation: orb-tick-pulse 2.8s ease-in-out infinite; }
        .orb-tick:nth-child(2) { animation-delay: .7s; }
        .orb-tick:nth-child(3) { animation-delay: 1.4s; }
        .orb-tick:nth-child(4) { animation-delay: 2.1s; }

        @keyframes orb-spin-cw  { to { transform: rotate(360deg); } }
        @keyframes orb-spin-ccw { to { transform: rotate(-360deg); } }
        @keyframes orb-breathe  {
            0%,100% { opacity: .35; transform: scale(.88); }
            50%      { opacity: 1;   transform: scale(1.06); }
        }
        @keyframes orb-tick-pulse {
            0%,100% { opacity: .2; }
            50%      { opacity: .7; }
        }

        .empty-label {
            font-size: 10.5px;
            letter-spacing: .26em;
            text-transform: uppercase;
            color: var(--tx-3);
            font-family: 'IBM Plex Mono', monospace
        }

        .empty-desc {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12.5px;
            color: var(--tx-3);
            text-align: center;
            max-width: 260px;
            line-height: 1.7
        }

        /* Status bar */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: var(--bg-s);
            border-top: 1px solid var(--bd);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            height: 26px
        }

        .status-bar::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 0;
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, var(--ac), transparent)
        }

        .status-seg {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 9.5px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--tx-3);
            padding: 0 12px;
            border-right: 1px solid var(--bd);
            height: 100%
        }

        .status-seg:first-child {
            padding-left: 0
        }

        .status-seg:last-child {
            border-right: none;
            margin-left: auto;
            padding-right: 0
        }

        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--ok);
            box-shadow: 0 0 5px var(--ok)
        }

        .status-val {
            color: var(--tx-2)
        }

        /* History */
        .hist-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 1rem
        }

        .hist-filter-btn {
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--tx-3);
            background: none;
            border: 1px solid var(--bd);
            padding: 4px 11px;
            cursor: pointer;
            transition: all .13s
        }

        .hist-filter-btn:hover {
            color: var(--tx-2);
            border-color: var(--bd-m)
        }

        .hist-filter-btn.active {
            color: var(--ac);
            border-color: var(--ac-bd);
            background: var(--ac-bg)
        }

        .hist-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem
        }

        .hist-count {
            font-size: 10.5px;
            color: var(--tx-3);
            font-family: 'IBM Plex Mono', monospace
        }

        .clear-btn {
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--tx-3);
            background: none;
            border: 1px solid var(--bd);
            padding: 4px 9px;
            cursor: pointer;
            transition: all .12s
        }

        .clear-btn:hover {
            color: var(--danger);
            border-color: var(--danger)
        }

        .hist-list {
            display: flex;
            flex-direction: column;
            gap: 7px
        }

        .hist-empty {
            text-align: center;
            padding: 5rem 1rem;
            color: var(--tx-3);
            font-size: 12px;
            line-height: 2.8;
            white-space: pre-line;
            font-family: 'Space Grotesk', sans-serif
        }

        .hist-item {
            background: linear-gradient(135deg, var(--bg-s), var(--bg-r));
            border: 1px solid var(--bd);
            overflow: hidden;
            transition: border-color .13s
        }

        .hist-item:hover {
            border-color: var(--bd-m)
        }

        .hist-item.starred-border {
            border-color: var(--ac-bd)
        }

        .hist-item-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .65rem 1rem;
            border-bottom: 1px solid var(--bd);
            cursor: pointer;
            gap: 8px
        }

        .hist-item-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--tx)
        }

        .hist-item-right {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-shrink: 0
        }

        .hist-type {
            font-size: 9px;
            letter-spacing: .12em;
            text-transform: uppercase;
            padding: 2px 7px;
            border: 1px solid var(--bd);
            color: var(--tx-3)
        }

        .hist-time {
            font-size: 10px;
            color: var(--tx-3);
            font-family: 'IBM Plex Mono', monospace
        }

        .hist-star-btn {
            font-size: 14px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--tx-3);
            padding: 0 2px;
            line-height: 1;
            transition: color .13s
        }

        .hist-star-btn:hover,
        .hist-star-btn.on {
            color: var(--ac)
        }

        .hist-expanded {
            border-top: none
        }


        /* ── Footer / credit ── */
        .site-footer {
            margin-top: 3rem;
            padding: 1.5rem 0 .5rem;
            border-top: 1px solid var(--bd);
            position: relative;
        }
        .site-footer::before {
            content: '';
            position: absolute;
            top: -1px; left: 0;
            width: 80px; height: 1px;
            background: linear-gradient(90deg, var(--ac-d), transparent);
        }
        .footer-inner {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
            gap: 3rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .footer-credit {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .footer-credit-by {
            font-size: 9.5px;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: var(--tx-3);
            font-family: 'IBM Plex Mono', monospace;
        }
        .footer-credit-by::before { content: '◆ '; color: var(--ac-d); }
        .footer-credit-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--tx-2);
        }
        .footer-credit-title {
            font-size: 10px;
            color: var(--tx-3);
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .12em;
        }
        .footer-links {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-start;
        }
        .footer-link {
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--tx-3);
            text-decoration: none;
            transition: color .13s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .footer-link::before {
            content: '◆';
            font-size: 4px;
            color: var(--ac-d);
        }
        .footer-link:hover { color: var(--ac); }
        .footer-bottom {
            margin-top: 1.25rem;
            padding-top: .75rem;
            border-top: 1px solid var(--bd);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .footer-copy {
            font-size: 9.5px;
            color: var(--tx-3);
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .1em;
        }
        .footer-version {
            font-size: 9.5px;
            color: var(--ac-d);
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .12em;
        }

        /* ── Changelog dot on new button ── */
        .new-dot {
            display: inline-block;
            width: 5px; height: 5px;
            background: var(--ac);
            border-radius: 50%;
            margin-left: 4px;
            vertical-align: middle;
            box-shadow: 0 0 5px var(--ac);
            animation: dot-pulse 2s ease-in-out infinite;
        }
        @keyframes dot-pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: .5; transform: scale(.8); }
        }

        /* ── Share button ── */
        .share-copied {
            color: var(--ok) !important;
            border-color: var(--ok) !important;
        }

        /* ── Brief count in header ── */
        .header-combo-count {
            font-size: 9.5px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .14em;
            color: var(--tx-3);
            margin-top: 5px;
        }
        .header-combo-count strong {
            color: var(--ac-d);
            font-weight: 400;
        }

        /* ── CREATIVE PASS ─────────────────────────────────────────────────── */

        /* Header — decorative rule with centered diamond glyph */
        .header-rule {
            display: flex;
            align-items: center;
            gap: 0;
            margin-top: 1.1rem;
            margin-bottom: -.5rem;
        }
        .header-rule-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--ac-d));
        }
        .header-rule-line.right {
            background: linear-gradient(90deg, var(--ac-d), transparent);
        }
        .header-rule-glyph {
            font-size: 8px;
            color: var(--ac);
            padding: 0 10px;
            letter-spacing: .2em;
        }

        /* Card header — inner top glow on loaded state */
        .card.brief-loaded .card-header {
            background: linear-gradient(180deg,
                rgba(200,160,80,.04) 0%,
                transparent 60%
            );
        }

        /* Brief headline — tighter tracking, slightly larger */
        .brief-val.headline {
            letter-spacing: .04em;
            font-size: 1.95rem;
        }

        /* Brief row — amber left bar sweeps in on hover */
        .brief-section {
            position: relative;
        }
        .brief-section::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, transparent, var(--ac-d), transparent);
            opacity: 0;
            transition: opacity .2s;
            pointer-events: none;
        }
        .brief-section:hover::before {
            opacity: 1;
        }

        /* Brief cell hover — amber top border flash */
        .brief-cell:hover {
            background: rgba(200, 160, 80, .03);
        }
        .brief-cell:hover::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, var(--ac-d), transparent);
            pointer-events: none;
        }

        /* Pillar tags — bevel top border only, slightly rounded feel */
        .pillar-tag {
            position: relative;
            transition: border-top-color .2s, color .2s;
        }
        .pillar-tag:hover {
            border-top-color: var(--ac);
            color: var(--ac-l);
        }

        /* History items — left accent bar by type */
        .hist-item {
            position: relative;
        }
        .hist-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 2px;
            opacity: .5;
        }
        .hist-item[data-type="character"]::before {
            background: var(--ac);
        }
        .hist-item[data-type="environment"]::before {
            background: var(--blue);
        }
        .hist-item:hover::before {
            opacity: 1;
        }

        /* Status bar — diamond before the app label */
        .status-brand::before {
            content: '◆ ';
            color: var(--ac-d);
            font-size: 6px;
            vertical-align: middle;
        }

        /* Card num badge — sharp diamond bullet before text */
        .card-num::before {
            content: '◆ ';
            font-size: 5px;
            color: var(--ac-d);
            vertical-align: middle;
        }

        /* Brief key label — diamond accent instead of line */
        .brief-key::before {
            content: '◆';
            display: inline-block;
            font-size: 4px;
            color: var(--ac-d);
            width: auto;
            height: auto;
            background: none;
            flex-shrink: 0;
            margin-right: 2px;
        }
        .brief-cell.locked .brief-key::before {
            color: var(--blue);
            background: none;
        }

        /* Tab bar — diamond separator between tabs */
        .tab + .tab::before {
            content: '◆';
            font-size: 4px;
            color: var(--tx-3);
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            opacity: .4;
        }

        /* Roll button — press depth */
        .gen-btn:active {
            transform: scale(.96) translateY(1px);
            box-shadow: 0 0 8px rgba(200,160,80,.2);
        }

        /* Ambient UI animations */

        /* Tab active glow */
        .tab.active {
            color: var(--ac);
            border-bottom-color: var(--ac);
            text-shadow: 0 0 10px rgba(200,160,80,.5);
        }

        /* Card hover corners */
        .card::before {
            transition: width .3s ease, height .3s ease, box-shadow .3s ease;
        }
        .card:hover::before {
            box-shadow: -3px -3px 12px rgba(200,160,80,.3);
        }
        .card:hover::after {
            box-shadow: 3px 3px 12px rgba(200,160,80,.2);
        }

        /* Brief cell — left traveling light on hover */
        .brief-cell::after {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 1.5px;
            background: linear-gradient(180deg, transparent, var(--ac), transparent);
            opacity: 0;
            transform: scaleY(0);
            transition: opacity .15s, transform .2s ease;
        }
        .brief-cell:hover::after {
            opacity: .7;
            transform: scaleY(1);
        }

        /* Brief headline — glow pulse */
        .brief-val.headline {
            animation: headline-glow 4s ease-in-out infinite 1s;
        }
        @keyframes headline-glow {
            0%, 80%, 100% { text-shadow: none; }
            90% { text-shadow: 0 0 20px rgba(240,208,128,.35), 0 0 40px rgba(200,160,80,.15); }
        }

        /* Pillar tags — staggered shimmer */
        .pillar-tag {
            animation: pillar-shimmer 5s ease-in-out infinite;
        }
        .pillar-tag:nth-child(2) { animation-delay: .8s; }
        .pillar-tag:nth-child(3) { animation-delay: 1.6s; }
        @keyframes pillar-shimmer {
            0%, 85%, 100% { border-top-color: rgba(200,160,80,.32); }
            92% { border-top-color: rgba(200,160,80,.85); box-shadow: 0 -1px 6px rgba(200,160,80,.3); }
        }

        /* Status dot — double pulse */
        .status-dot {
            animation: status-pulse 2.2s ease-in-out infinite;
        }
        @keyframes status-pulse {
            0%, 100% { box-shadow: 0 0 4px var(--ok); transform: scale(1); }
            50% { box-shadow: 0 0 8px var(--ok), 0 0 16px rgba(96,160,112,.3); transform: scale(1.2); }
        }

        /* Gen button — shimmer already exists, add lift glow */
        .gen-btn {
            position: relative;
        }
        .gen-btn::before {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(105deg, transparent 40%, rgba(240,208,96,.18) 50%, transparent 60%);
            background-size: 200% auto;
            animation: gen-sweep 2s linear infinite;
            pointer-events: none;
        }
        @keyframes gen-sweep { to { background-position: -200% center; } }

        /* Card header bottom gradient line — animated sweep */
        .card-header::after {
            animation: header-sweep 4s ease-in-out infinite;
        }
        @keyframes header-sweep {
            0%, 100% { opacity: .5; }
            50% { opacity: 1; }
        }

        /* Lock count badge — pulse */
        .lock-count {
            animation: lock-pulse 2.5s ease-in-out infinite;
        }
        @keyframes lock-pulse {
            0%, 100% { box-shadow: none; }
            50% { box-shadow: 0 0 8px rgba(74,144,184,.35); }
        }

        /* History item — left-edge amber reveal on hover */
        .hist-item {
            position: relative;
        }
        .hist-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, transparent, var(--ac), transparent);
            opacity: 0;
            transition: opacity .2s;
        }
        .hist-item:hover::before {
            opacity: .6;
        }

        /* Brief section — ambient background scan */
        .brief-section:nth-child(odd) {
            background: rgba(255,255,255,.008);
        }

        /* Card num badge glow */
        .card-num {
            animation: badge-glow 3s ease-in-out infinite;
        }
        @keyframes badge-glow {
            0%, 100% { box-shadow: 0 0 4px rgba(200,160,80,.1); }
            50% { box-shadow: 0 0 10px rgba(200,160,80,.3); }
        }

        /* Empty state corners — drift animation */
        .empty-drift {
            font-size: 5px;
            color: var(--ac-d);
            letter-spacing: 8px;
            animation: corner-drift 3s ease-in-out infinite;
            user-select: none;
        }
        @keyframes corner-drift {
            0%, 100% { opacity: .2; letter-spacing: 8px; }
            50% { opacity: .5; letter-spacing: 12px; }
        }

        /* Header title — ambient shimmer */
        .header-title {
            animation: title-ambient 7s ease-in-out infinite;
        }
        @keyframes title-ambient {
            0%, 80%, 100% { text-shadow: none; }
            90% { text-shadow: 0 0 30px rgba(240,208,128,.2); }
        }

        /* Walkthrough tour */
        .tour-backdrop {
            position: fixed; inset: 0; z-index: 200;
            pointer-events: none;
        }
        .tour-overlay {
            position: fixed; inset: 0; z-index: 201;
            background: rgba(7,7,14,.82);
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
        }
        .tour-panel {
            width: 520px; max-width: 95vw;
            background: var(--bg-r);
            border: 1px solid var(--bd-m);
            position: relative;
            animation: tour-in .22s ease;
        }
        @keyframes tour-in {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: none; }
        }
        /* corner brackets on tour panel */
        .tour-panel::before {
            content: ''; position: absolute; top: -1px; left: -1px;
            width: 18px; height: 18px;
            border-top: 1px solid var(--ac); border-left: 1px solid var(--ac);
        }
        .tour-panel::after {
            content: ''; position: absolute; bottom: -1px; right: -1px;
            width: 18px; height: 18px;
            border-bottom: 1px solid var(--ac-d); border-right: 1px solid var(--ac-d);
        }
        .tour-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: .75rem 1.1rem;
            border-bottom: 1px solid var(--bd);
            background: linear-gradient(135deg, rgba(200,160,80,.04), transparent);
        }
        .tour-header-left { display: flex; align-items: center; gap: 10px; }
        .tour-step-num {
            font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
            color: var(--ac-d);
            background: var(--ac-bg); border: 1px solid var(--ac-bd);
            padding: 2px 7px;
        }
        .tour-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem; font-weight: 700; letter-spacing: .1em;
            text-transform: uppercase; color: var(--ac-l);
        }
        .tour-close {
            font-size: 11px; font-family: 'IBM Plex Mono', monospace;
            color: var(--tx-3); background: none; border: 1px solid var(--bd);
            padding: 3px 8px; cursor: pointer; transition: all .13s;
        }
        .tour-close:hover { color: var(--tx-2); border-color: var(--bd-m); }
        .tour-body {
            padding: 1.25rem 1.1rem 1rem;
        }
        .tour-desc {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px; color: var(--tx-2); line-height: 1.75;
            margin-bottom: 1rem;
        }
        .tour-desc strong { color: var(--tx); font-weight: 500; }
        .tour-tip {
            font-size: 10px; color: var(--ac-d); letter-spacing: .06em;
            border-left: 2px solid var(--ac-d); padding-left: .7rem;
            line-height: 1.6; margin-bottom: 1.25rem;
        }
        .tour-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding: .75rem 1.1rem;
            border-top: 1px solid var(--bd);
        }
        .tour-dots { display: flex; gap: 6px; align-items: center; }
        .tour-dot {
            width: 5px; height: 5px;
            background: var(--bd-m);
            transform: rotate(45deg);
            transition: background .15s, transform .15s;
        }
        .tour-dot.active {
            background: var(--ac);
            transform: rotate(45deg) scale(1.3);
            box-shadow: 0 0 6px rgba(200,160,80,.5);
        }
        .tour-prev {
            font-size: 9px; font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .1em; text-transform: uppercase;
            color: var(--tx-3); background: none; border: 1px solid var(--bd);
            padding: 6px 14px; cursor: pointer; transition: all .13s;
        }
        .tour-prev:hover { color: var(--tx-2); border-color: var(--bd-m); }
        .tour-next {
            font-size: 9px; font-family: 'Rajdhani', sans-serif;
            letter-spacing: .18em; text-transform: uppercase; font-weight: 700;
            color: #06060C;
            background: linear-gradient(105deg,#6A500A,#C89838,#F0D070,#C89838,#6A500A);
            background-size: 250% auto;
            border: none; padding: 7px 20px; cursor: pointer;
            animation: btn-shim 2.5s linear infinite;
            transition: opacity .13s;
        }
        .tour-next:hover { opacity: .88; }
        .tour-btn {
            font-size: 10.5px; font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .1em; text-transform: uppercase;
            color: var(--tx-3); background: none;
            border: 1px solid var(--bd); padding: 4px 10px; cursor: pointer;
            transition: all .13s;
        }
        .tour-btn:hover { color: var(--ac); border-color: var(--ac-bd); }
        .tour-header-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: .3rem;
        }


        /* ── What's New modal ── */
        .whatsnew-overlay {
            position: fixed; inset: 0; z-index: 300;
            background: rgba(7,7,14,.88);
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
        }
        .whatsnew-panel {
            width: 540px; max-width: 95vw;
            background: var(--bg-r);
            border: 1px solid var(--bd-m);
            position: relative;
            animation: tour-in .2s ease;
            max-height: 80vh;
            display: flex; flex-direction: column;
        }
        .whatsnew-panel::before {
            content: ''; position: absolute; top: -1px; left: -1px;
            width: 18px; height: 18px;
            border-top: 1px solid var(--ac); border-left: 1px solid var(--ac);
        }
        .whatsnew-panel::after {
            content: ''; position: absolute; bottom: -1px; right: -1px;
            width: 18px; height: 18px;
            border-bottom: 1px solid var(--ac-d); border-right: 1px solid var(--ac-d);
        }
        .whatsnew-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: .75rem 1.1rem;
            border-bottom: 1px solid var(--bd);
            background: rgba(200,160,80,.04);
            flex-shrink: 0;
        }
        .whatsnew-header-left { display: flex; align-items: center; gap: 10px; }
        .whatsnew-version {
            font-size: 9.5px; letter-spacing: .2em; text-transform: uppercase;
            color: var(--ac); background: var(--ac-bg); border: 1px solid var(--ac-bd);
            padding: 2px 7px;
        }
        .whatsnew-htitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem; font-weight: 700;
            letter-spacing: .1em; text-transform: uppercase; color: var(--ac-l);
        }
        .whatsnew-body { overflow-y: auto; padding: 1rem 1.1rem; flex: 1; }
        .whatsnew-entry { margin-bottom: 1.25rem; }
        .whatsnew-entry-tag {
            display: inline-block;
            font-size: 9px; letter-spacing: .14em; text-transform: uppercase;
            padding: 1px 6px; margin-bottom: 5px;
            border: 1px solid var(--bd); color: var(--tx-3);
            font-family: 'IBM Plex Mono', monospace;
        }
        .whatsnew-entry-tag.new { border-color: var(--ok); color: var(--ok); }
        .whatsnew-entry-tag.improved { border-color: var(--blue); color: var(--blue); }
        .whatsnew-entry-tag.fixed { border-color: var(--ac-d); color: var(--ac-d); }
        .whatsnew-entry-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: .9rem; font-weight: 700;
            letter-spacing: .08em; text-transform: uppercase;
            color: var(--tx); margin-bottom: 3px;
        }
        .whatsnew-entry-desc {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px; color: var(--tx-2); line-height: 1.65;
        }
        .whatsnew-footer {
            padding: .75rem 1.1rem;
            border-top: 1px solid var(--bd);
            display: flex; justify-content: flex-end; flex-shrink: 0;
        }

        /* ── Custom words panel ── */
        .custom-overlay {
            position: fixed; inset: 0; z-index: 300;
            background: rgba(7,7,14,.88);
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
        }
        .custom-panel {
            width: 620px; max-width: 96vw; max-height: 85vh;
            background: var(--bg-r); border: 1px solid var(--bd-m);
            display: flex; flex-direction: column;
            position: relative; animation: tour-in .2s ease;
        }
        .custom-panel::before {
            content: ''; position: absolute; top:-1px; left:-1px;
            width:18px; height:18px;
            border-top:1px solid var(--ac); border-left:1px solid var(--ac);
        }
        .custom-panel::after {
            content: ''; position: absolute; bottom:-1px; right:-1px;
            width:18px; height:18px;
            border-bottom:1px solid var(--ac-d); border-right:1px solid var(--ac-d);
        }
        .custom-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: .75rem 1.1rem; border-bottom: 1px solid var(--bd);
            background: rgba(200,160,80,.04); flex-shrink: 0;
        }
        .custom-title {
            font-family: 'Rajdhani', sans-serif; font-size: .95rem; font-weight: 700;
            letter-spacing: .1em; text-transform: uppercase; color: var(--ac-l);
        }
        .custom-body { display: flex; flex: 1; overflow: hidden; }
        .custom-sidebar {
            width: 160px; border-right: 1px solid var(--bd);
            overflow-y: auto; flex-shrink: 0;
        }
        .custom-bank-btn {
            display: block; width: 100%;
            font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--tx-3); background: none; border: none;
            border-bottom: 1px solid var(--bd);
            padding: .55rem .8rem; cursor: pointer; text-align: left;
            transition: all .12s;
        }
        .custom-bank-btn:hover { color: var(--tx-2); background: var(--bg-h); }
        .custom-bank-btn.active { color: var(--ac); background: var(--ac-bg); }
        .custom-bank-btn .custom-count {

    <script>
        (function () {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');

            let particles = [];

            function resize() {
                canvas.width  = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function makeParticle(fromTop) {
                const tier = Math.random();
                // 15% chance of a bright "featured" diamond, rest are subtle
                const bright = tier > 0.85;
                const sz = bright ? Math.random() * 2.5 + 2.5 : Math.random() * 2 + 1;
                return {
                    x:        Math.random() * canvas.width,
                    y:        fromTop ? -sz * 6 : Math.random() * canvas.height,
                    sz:       sz,
                    speed:    Math.random() * 0.28 + 0.06,
                    alpha:    bright ? Math.random() * 0.28 + 0.18 : Math.random() * 0.10 + 0.04,
                    alphaMax: bright ? 0.46 : 0.18,
                    pulse:    bright ? Math.random() * Math.PI * 2 : -1, // -1 = no pulse
                    pulseSpd: 0.012 + Math.random() * 0.008,
                    rot:      Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * (bright ? 0.006 : 0.003),
                    drift:    (Math.random() - 0.5) * 0.06,
                    col:      bright
                              ? [240, 210, 120]
                              : Math.random() < 0.6
                                ? [200, 160, 80]
                                : [160, 120, 50],
                    glow:     bright,
                };
            }

            function seed() {
                particles = [];
                const count = Math.floor(canvas.width / 14);
                for (let i = 0; i < count; i++) {
                    particles.push(makeParticle(false));
                }
            }

            function drawDiamond(x, y, sz, rot) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rot);
                ctx.beginPath();
                ctx.moveTo(0, -sz);
                ctx.lineTo(sz, 0);
                ctx.lineTo(0,  sz);
                ctx.lineTo(-sz, 0);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            let frame = 0;
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                frame++;

                for (const p of particles) {
                    p.y   += p.speed;
                    p.x   += p.drift;
                    p.rot += p.rotSpeed;

                    if (p.y > canvas.height + p.sz * 6) {
                        Object.assign(p, makeParticle(true));
                    }

                    // Pulsing alpha for bright diamonds
                    let a = p.alpha;
                    if (p.pulse >= 0) {
                        p.pulse += p.pulseSpd;
                        a = p.alpha + Math.sin(p.pulse) * (p.alphaMax - p.alpha) * 0.6;
                    }

                    ctx.globalAlpha = Math.min(a, p.alphaMax);

                    if (p.glow) {
                        // Soft glow halo for bright diamonds
                        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.sz * 3.5);
                        g.addColorStop(0, `rgba(${p.col[0]},${p.col[1]},${p.col[2]},0.18)`);
                        g.addColorStop(1, `rgba(${p.col[0]},${p.col[1]},${p.col[2]},0)`);
                        ctx.fillStyle = g;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.sz * 3.5, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    ctx.globalAlpha = Math.min(a, p.alphaMax);
                    ctx.fillStyle = `rgb(${p.col[0]},${p.col[1]},${p.col[2]})`;
                    drawDiamond(p.x, p.y, p.sz, p.rot);
                }

                ctx.globalAlpha = 1;
                requestAnimationFrame(draw);
            }

            resize();
            seed();
            window.addEventListener('resize', () => { resize(); seed(); });
            requestAnimationFrame(draw);
        })();
    </script>

            ctx() { if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)(); return this._ctx; },
            play(type) {
                if (!this._on) return;
                try {
                    const ctx = this.ctx();
                    if (type === 'roll') {
                        [0, 0.04, 0.08].forEach((t, i) => {
                            const o = ctx.createOscillator(), og = ctx.createGain();
                            o.connect(og); og.connect(ctx.destination);
                            o.frequency.value = 280 + i * 80;
                            og.gain.setValueAtTime(.06, ctx.currentTime + t);
                            og.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + .08);
                            o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .08);
                        });
                    } else if (type === 'lock') {
                        const o = ctx.createOscillator(), og = ctx.createGain();
                        o.connect(og); og.connect(ctx.destination);
                        o.frequency.value = 520;
                        og.gain.setValueAtTime(.04, ctx.currentTime);
                        og.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .12);
                        o.start(); o.stop(ctx.currentTime + .12);
                    } else if (type === 'star') {
                        [0, 0.1].forEach((t, i) => {
                            const o = ctx.createOscillator(), og = ctx.createGain();
                            o.connect(og); og.connect(ctx.destination);
                            o.frequency.value = i === 0 ? 440 : 660;
                            og.gain.setValueAtTime(.04, ctx.currentTime + t);
                            og.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + .15);
                            o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .15);
                        });
                    }
                } catch(e) {}
            },
            toggle() { this._on = !this._on; store.set('sfx_on', this._on ? '1' : '0'); return this._on; },
            isOn() { return this._on; }

        const AMBIENT = {
            _ctx: null, _playing: false, _nodes: [], _gain: null,
            _on: store.get('ambient_on') === '1',
            ctx() {
                if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();

            start() {
                if (this._playing) return;

                    const ctx = this.ctx();

                        filt.frequency.value = 400 + i * 80;

                                const bo = bc.createOscillator();
                                const bg = bc.createGain();
                                bo.type = 'sine';
                                bo.frequency.value = bf;
                                bg.gain.setValueAtTime(0, bc.currentTime);
                                bg.gain.linearRampToValueAtTime(0.07, bc.currentTime + 0.05);
                                bg.gain.exponentialRampToValueAtTime(0.001, bc.currentTime + 3.5);
                                bo.connect(bg); bg.connect(this._gain);
                                bo.start(); bo.stop(bc.currentTime + 3.5);
                            } catch(e) {}
                            schedBell();
                        }, delay);
                    };
                    schedBell();
                } catch(e) { this._playing = false; }
            },
            stop() {
                this._playing = false;
                if (this._gain) {
                    try {
                        this._gain.gain.linearRampToValueAtTime(0, this._ctx.currentTime + 2);
                        setTimeout(() => {
                            this._nodes.forEach(n => { try { n.stop && n.stop(); n.disconnect && n.disconnect(); } catch(e){} });
                            this._nodes = [];
                            this._gain = null;
                        }, 2100);
                    } catch(e) {}

        const pick = a => a[Math.floor(Math.random() * a.length)];
        function picks(a, n) { const c = [...a], r = []; for (let i = 0; i < Math.min(n, c.length); i++) { const x = Math.floor(Math.random() * c.length); r.push(c.splice(x, 1)[0]); } return r; }
        // Pick respecting pinned entries — if pins exist for this bank key, pick from those only
        const _pins = loadPins();


        function encodeBrief(d) {
            try { return btoa(encodeURIComponent(JSON.stringify(d))); } catch { return null; }
        }
        function decodeBrief(s) {
            try { return JSON.parse(decodeURIComponent(atob(s))); } catch { return null; }
        }
        function getShareURL(d) {
            const enc = encodeBrief(d);
            if (!enc) return null;
            return window.location.href.split('#')[0] + '#brief=' + enc;

        function getBriefCombinations() {
            // rough estimate: multiply major field pool sizes
            const c = W.jobs.length * W.races.length * W.genres.length * W.themes.length *
                      W.cultures.length * W.shapes.length;
            const e = W.buildingTypes.length * W.envFunctions.length * W.biomes.length *
                      W.genres.length * W.themes.length * W.cultures.length;
            const total = c + e;
            if (total >= 1e12) return (total / 1e12).toFixed(1) + 'T';
            if (total >= 1e9) return (total / 1e9).toFixed(1) + 'B';
            if (total >= 1e6) return (total / 1e6).toFixed(1) + 'M';
            if (total >= 1e3) return Math.round(total / 1e3) + 'K';
            return total.toLocaleString();
        }
        function pickPinned(bankKey, arr) { const p = _pins[bankKey]; return (p && p.length > 0) ? p[Math.floor(Math.random()*p.length)] : pick(arr); }

        /* Sigil — a self-drawing geometric seal. All paths use stroke-dashoffset animation. */
        function Sigil({ progress }) {
            // progress 0..1 controls how many lines have drawn in
            // We define line segments as SVG paths in draw order
            // viewBox 600x600, center 300,300
            const C = 300, R1 = 240, R2 = 160, R3 = 90, R4 = 40;

            // Octagon points at R1
            const oct = Array.from({length:8},(_,i)=>{
                const a = (i*45 - 90) * Math.PI/180;
                return [C + R1*Math.cos(a), C + R1*Math.sin(a)];
            });
            // Square points at R2 (rotated 45)
            const sq = Array.from({length:4},(_,i)=>{
                const a = (i*90) * Math.PI/180;
                return [C + R2*Math.cos(a), C + R2*Math.sin(a)];
            });
            // Diamond points at R3
            const dia = Array.from({length:4},(_,i)=>{
                const a = (i*90 - 45) * Math.PI/180;
                return [C + R3*Math.cos(a), C + R3*Math.sin(a)];
            });

            const octPath = oct.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ')+'Z';
            const sqPath  = sq.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ')+'Z';
            const diaPath = dia.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ')+'Z';

            // Cross lines (axis)
            const crossLines = [
                `M${C},${C-R1} L${C},${C+R1}`,
                `M${C-R1},${C} L${C+R1},${C}`,
                `M${C-R1*0.707},${C-R1*0.707} L${C+R1*0.707},${C+R1*0.707}`,
                `M${C+R1*0.707},${C-R1*0.707} L${C-R1*0.707},${C+R1*0.707}`,
            ];

            // Spoke connectors oct to sq
            const spokes = oct.map((op,i)=>{
                const sq_i = i % 4;
                return `M${op[0]},${op[1]} L${sq[sq_i][0]},${sq[sq_i][1]}`;
            });

            const segs = [
                // 0-1: outer octagon (two halves)
                {d: oct.slice(0,5).map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' '), l:1200, delay:.05, dur:.5, dim:false},
                {d: oct.slice(4).concat([oct[0]]).map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' '), l:1200, delay:.1, dur:.5, dim:false},
                // 2-3: axis lines
                {d:crossLines[0], l:480, delay:.45, dur:.3, dim:true},
                {d:crossLines[1], l:480, delay:.5, dur:.3, dim:true},
                {d:crossLines[2], l:480, delay:.55, dur:.3, dim:true},
                {d:crossLines[3], l:480, delay:.6, dur:.3, dim:true},
                // 4: inner square
                {d:sqPath, l:900, delay:.7, dur:.45, dim:false},
                // 5-8: spokes
                ...spokes.map((s,i)=>({d:s, l:220, delay:.85+i*.04, dur:.2, dim:true})),
                // 9: inner diamond
                {d:diaPath, l:500, delay:1.15, dur:.35, dim:false},
            ];

            const dots = [
                ...oct.map(p=>({cx:p[0],cy:p[1],r:3,delay:1.4})),
                ...sq.map(p=>({cx:p[0],cy:p[1],r:4,delay:1.45})),
                ...dia.map(p=>({cx:p[0],cy:p[1],r:3,delay:1.5})),
                {cx:C,cy:C,r:6,delay:1.55},
            ];

            return (
                <div className="sigil-wrap">
                    <svg className="sigil-svg" width="300" height="300" viewBox="100 100 400 400" xmlns="http://www.w3.org/2000/svg">
                        {/* dim background guide lines */}
                        {crossLines.map((d,i)=>(
                            <path key={`g${i}`} d={d} className="sigil-line-dim" strokeWidth=".5" opacity=".3"/>
                        ))}
                        {/* animated draw segments */}
                        {segs.map((s,i)=>(
                            <path key={`s${i}`} d={s.d}
                                className={`sigil-line sigil-draw ${s.dim?'sigil-line-dim':''}`}
                                strokeWidth={s.dim?".75":"1.2"}
                                style={{"--l":s.l,"--delay":`${s.delay}s`,"--d":`${s.dur}s`}}
                                stroke={s.dim?"#4A3810":"#C8A050"}
                            />
                        ))}
                        {/* glow layer — same paths, blurred */}
                        <g filter="url(#glow)">
                            <path d={octPath} fill="none" stroke="#C8A050" strokeWidth="1.5" className="sigil-draw" style={{"--l":1900,"--delay":"0s","--d":"1s"}} opacity=".35"/>
                            <path d={sqPath} fill="none" stroke="#C8A050" strokeWidth="1" className="sigil-draw" style={{"--l":900,"--delay":".65s","--d":".5s"}} opacity=".3"/>
                            <path d={diaPath} fill="none" stroke="#C8A050" strokeWidth="1" className="sigil-draw" style={{"--l":500,"--delay":"1.1s","--d":".4s"}} opacity=".3"/>
                        </g>
                        {/* intersection dots */}
                        {dots.map((d,i)=>(
                            <circle key={`d${i}`} cx={d.cx} cy={d.cy} r={d.r}
                                className="sigil-dot sigil-fade"
                                style={{"--delay":`${d.delay}s`}}
                                opacity=".9"
                            />

                        {/* center diamond */}
                        <rect x={C-10} y={C-10} width="20" height="20" fill="none" stroke="#C8A050" strokeWidth="1"
                            transform={`rotate(45 ${C} ${C})`}
                            className="sigil-draw" style={{"--l":80,"--delay":"1.5s","--d":".25s"}}/>
                        <rect x={C-4} y={C-4} width="8" height="8"

                                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                            </filter>

                    </svg>

                const cur = pinData[activeBank] || [];
