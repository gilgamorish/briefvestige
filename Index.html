<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Brief Generator / AAA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg: #07070E;
            --bg-s: #0C0D1A;
            --bg-r: #111220;
            --bg-h: #191A2C;
            --bd: #252640;
            --bd-m: #383A58;
            --tx: #F2EAD4;
            --tx-2: #9A8C6C;
            --tx-3: #4A4638;
            --ac: #C8A050;
            --ac-l: #F0D080;
            --ac-d: #7A6028;
            --ac-bg: rgba(200, 160, 80, .10);
            --ac-bd: rgba(200, 160, 80, .28);
            --blue: #4A90B8;
            --blue-bg: rgba(74, 144, 184, .10);
            --blue-bd: rgba(74, 144, 184, .28);
            --ok: #60A070;
            --ok-bg: rgba(96, 160, 112, .10);
            --danger: #C05040;
            --r: 2px;
            --R: 3px
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--tx);
            min-height: 100vh;
            font-size: 13px;
            overflow-x: hidden
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bd-m)
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(200, 160, 80, .05) 1px, transparent 1px);
            background-size: 36px 36px
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse 70% 50% at 10% 10%, rgba(200, 160, 80, .05) 0%, transparent 55%), radial-gradient(ellipse 60% 50% at 90% 90%, rgba(74, 144, 184, .05) 0%, transparent 55%)
        }

        #starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 5rem
        }

        /* Header */
        .header {
            margin-bottom: 2rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--bd);
            position: relative
        }

        .header::before {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 60px;
            height: 1px;
            background: var(--ac)
        }

        .header::after {
            content: '▪';
            position: absolute;
            bottom: -5px;
            left: 58px;
            font-size: 6px;
            color: var(--ac)
        }

        .header-eyebrow {
            font-size: 9px;
            letter-spacing: .32em;
            text-transform: uppercase;
            color: var(--ac-d);
            font-family: 'IBM Plex Mono', monospace;
            margin-bottom: 8px
        }

        .header-eyebrow::before {
            content: '[ ';
            color: var(--ac)
        }

        .header-eyebrow::after {
            content: ' ]';
            color: var(--ac)
        }

        .header-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--ac-l);
            line-height: 1
        }

        .header-title span {
            font-family: 'IBM Plex Mono', monospace;
            font-size: .75rem;
            font-weight: 300;
            letter-spacing: .3em;
            color: var(--tx-3);
            vertical-align: middle;
            margin-left: 10px
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--bd);
            margin-bottom: 1.75rem
        }

        .tab {
            font-size: 9px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--tx-3);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            padding: .6rem 1.2rem;
            cursor: pointer;
            margin-bottom: -1px;
            transition: all .2s
        }

        .tab:hover {
            color: var(--tx-2)
        }

        .tab.active {
            color: var(--ac);
            border-bottom-color: var(--ac)
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--ac);
            box-shadow: 0 0 6px var(--ac)
        }

        .tab {
            position: relative
        }

        /* Cards */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 1.25rem
        }

        .card {
            background: linear-gradient(160deg, var(--bg-s) 0%, var(--bg-r) 100%);
            border: 1px solid var(--bd);
            border-radius: var(--R);
            position: relative;
            overflow: visible;
            transition: border-color .25s, box-shadow .25s
        }

        .card:hover {
            border-color: var(--bd-m)
        }

        .card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            width: 16px;
            height: 16px;
            border-top: 1px solid var(--ac);
            border-left: 1px solid var(--ac);
            z-index: 2
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -1px;
            right: -1px;
            width: 16px;
            height: 16px;
            border-bottom: 1px solid var(--ac-d);
            border-right: 1px solid var(--ac-d);
            z-index: 2
        }

        .card.brief-loaded {
            border-color: rgba(200, 160, 80, .22);
            box-shadow: 0 0 28px rgba(200, 160, 80, .07)
        }

        .card.brief-loaded::before {
            border-color: var(--ac);
            animation: cg 3s ease-in-out infinite
        }

        .card.brief-loaded::after {
            border-color: var(--ac);
            animation: cg 3s ease-in-out .6s infinite
        }

        @keyframes cg {

            0%,
            100% {
                box-shadow: -2px -2px 5px rgba(200, 160, 80, .1)
            }

            50% {
                box-shadow: -2px -2px 10px rgba(200, 160, 80, .35)
            }
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .75rem 1.2rem;
            border-bottom: 1px solid var(--bd);
            gap: 8px;
            flex-wrap: wrap;
            background: linear-gradient(135deg, rgba(255, 255, 255, .02) 0%, transparent 100%);
            position: relative;
            overflow: hidden
        }

        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--ac-bd), transparent)
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .card-num {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8.5px;
            color: var(--ac);
            min-width: 24px;
            letter-spacing: .08em;
            background: var(--ac-bg);
            border: 1px solid var(--ac-bd);
            padding: 2px 6px;
            text-align: center;
            box-shadow: 0 0 6px rgba(200, 160, 80, .12)
        }

        .card-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: .95rem;
            font-weight: 700;
            color: var(--tx);
            letter-spacing: .14em;
            text-transform: uppercase
        }

        .card-badge {
            font-size: 7px;
            letter-spacing: .16em;
            text-transform: uppercase;
            padding: 2px 7px;
            border: 1px solid var(--bd);
            color: var(--tx-3)
        }

        .lock-count {
            font-size: 7px;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: 2px 8px;
            background: var(--blue-bg);
            color: var(--blue);
            border: 1px solid var(--blue-bd)
        }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap
        }

        .action-btn {
            font-size: 8.5px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .06em;
            color: var(--tx-3);
            background: none;
            border: 1px solid var(--bd);
            padding: 5px 10px;
            cursor: pointer;
            transition: all .13s;
            white-space: nowrap
        }

        .action-btn:hover {
            color: var(--tx-2);
            border-color: var(--bd-m);
            background: var(--bg-h)
        }

        .action-btn.ok {
            color: var(--ok)
        }

        .gen-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 9px;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: .18em;
            text-transform: uppercase;
            font-weight: 700;
            color: #06060C;
            background: linear-gradient(105deg, #6A500A 0%, #C89838 28%, #F0D070 50%, #C89838 72%, #6A500A 100%);
            background-size: 250% auto;
            border: none;
            padding: 7px 18px;
            cursor: pointer;
            transition: opacity .13s, transform .1s, box-shadow .2s;
            animation: btn-shim 2.5s linear infinite;
            box-shadow: 0 2px 14px rgba(200, 160, 80, .3)
        }

        .gen-btn:hover {
            opacity: .88;
            box-shadow: 0 2px 22px rgba(200, 160, 80, .5);
            transform: translateY(-1px)
        }

        .gen-btn:active {
            transform: scale(.97)translateY(0)
        }

        @keyframes btn-shim {
            to {
                background-position: -250% center
            }
        }

        .star-btn {
            font-size: 16px;
            background: none;
            border: 1px solid var(--bd);
            cursor: pointer;
            color: var(--tx-3);
            padding: 4px 8px;
            line-height: 1;
            transition: all .13s
        }

        .star-btn:hover {
            color: var(--ac);
            border-color: var(--ac-bd)
        }

        .star-btn.on {
            color: var(--ac);
            border-color: var(--ac-bd);
            background: var(--ac-bg)
        }

        /* Brief grid */
        .brief {
            display: flex;
            flex-direction: column
        }

        .brief-section {
            display: grid;
            border-bottom: 1px solid var(--bd);
            opacity: 0;
            transform: translateY(4px);
            animation: ri .3s ease forwards;
            animation-delay: calc(var(--row-i, 0)*50ms)
        }

        .brief-section:last-child {
            border-bottom: none
        }

        .brief-section.c1 {
            grid-template-columns: 1fr
        }

        .brief-section.c2 {
            grid-template-columns: 1fr 1fr
        }

        .brief-section.c3 {
            grid-template-columns: 1fr 1fr 1fr
        }

        @keyframes ri {
            to {
                opacity: 1;
                transform: none
            }
        }

        .brief-cell {
            padding: .65rem 1.1rem;
            border-right: 1px solid var(--bd);
            cursor: pointer;
            transition: background .11s;
            position: relative
        }

        .brief-cell:last-child {
            border-right: none
        }

        .brief-cell:hover {
            background: rgba(255, 255, 255, .025)
        }

        .brief-cell.locked {
            background: var(--blue-bg)
        }

        .brief-cell.locked:hover {
            background: rgba(74, 144, 184, .12)
        }



        .brief-cell.locked:hover::before {
            background: var(--blue)
        }

        .brief-key {
            font-size: 7px;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: var(--tx-3);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'IBM Plex Mono', monospace
        }

        .brief-key::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 1px;
            background: linear-gradient(90deg, var(--ac-d), transparent);
            flex-shrink: 0
        }

        .brief-cell.locked .brief-key {
            color: var(--blue)
        }

        .brief-cell.locked .brief-key::before {
            background: linear-gradient(90deg, var(--blue), transparent)
        }

        .lock-pip {
            font-size: 5px;
            color: var(--blue);
            margin-left: 2px
        }

        .brief-val {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12.5px;
            color: var(--tx);
            line-height: 1.5;
            font-weight: 400
        }

        .brief-val.headline {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--ac-l);
            line-height: 1.1
        }

        .brief-val.pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 3px
        }

        .pillar-tag {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8.5px;
            padding: 3px 10px;
            background: linear-gradient(135deg, rgba(200, 160, 80, .14), rgba(200, 160, 80, .04));
            border-top: 1px solid rgba(200, 160, 80, .32);
            border-left: 1px solid rgba(200, 160, 80, .14);
            border-right: 1px solid rgba(200, 160, 80, .14);
            border-bottom: 1px solid transparent;
            color: var(--ac-l);
            letter-spacing: .12em;
            text-transform: uppercase
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3.5rem 1rem;
            gap: 14px;
            position: relative;
            overflow: hidden
        }

        .empty-state::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(200, 160, 80, .012) 3px, rgba(200, 160, 80, .012) 4px);
            pointer-events: none
        }

        .empty-orb {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        /* SVG orb animations */
        .orb-outer { animation: orb-spin-cw 10s linear infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-mid   { animation: orb-spin-ccw 7s linear infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-core  { animation: orb-breathe 2.8s ease-in-out infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-dot   { animation: orb-spin-cw 10s linear infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-dot2  { animation: orb-spin-ccw 7s linear infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-center{ animation: orb-breathe 2.8s ease-in-out infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-tick  { animation: orb-tick-pulse 2.8s ease-in-out infinite; }
        .orb-tick:nth-child(2) { animation-delay: .7s; }
        .orb-tick:nth-child(3) { animation-delay: 1.4s; }
        .orb-tick:nth-child(4) { animation-delay: 2.1s; }

        @keyframes orb-spin-cw  { to { transform: rotate(360deg); } }
        @keyframes orb-spin-ccw { to { transform: rotate(-360deg); } }
        @keyframes orb-breathe  {
            0%,100% { opacity: .35; transform: scale(.88); }
            50%      { opacity: 1;   transform: scale(1.06); }
        }
        @keyframes orb-tick-pulse {
            0%,100% { opacity: .2; }
            50%      { opacity: .7; }
        }

        .empty-label {
            font-size: 8.5px;
            letter-spacing: .26em;
            text-transform: uppercase;
            color: var(--tx-3);
            font-family: 'IBM Plex Mono', monospace
        }

        .empty-desc {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px;
            color: var(--tx-3);
            text-align: center;
            max-width: 260px;
            line-height: 1.7
        }

        /* Status bar */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: var(--bg-s);
            border-top: 1px solid var(--bd);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            height: 26px
        }

        .status-bar::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 0;
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, var(--ac), transparent)
        }

        .status-seg {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 8px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--tx-3);
            padding: 0 12px;
            border-right: 1px solid var(--bd);
            height: 100%
        }

        .status-seg:first-child {
            padding-left: 0
        }

        .status-seg:last-child {
            border-right: none;
            margin-left: auto;
            padding-right: 0
        }

        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--ok);
            box-shadow: 0 0 5px var(--ok)
        }

        .status-val {
            color: var(--tx-2)
        }

        /* History */
        .hist-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 1rem
        }

        .hist-filter-btn {
            font-size: 8.5px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--tx-3);
            background: none;
            border: 1px solid var(--bd);
            padding: 4px 11px;
            cursor: pointer;
            transition: all .13s
        }

        .hist-filter-btn:hover {
            color: var(--tx-2);
            border-color: var(--bd-m)
        }

        .hist-filter-btn.active {
            color: var(--ac);
            border-color: var(--ac-bd);
            background: var(--ac-bg)
        }

        .hist-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem
        }

        .hist-count {
            font-size: 9px;
            color: var(--tx-3);
            font-family: 'IBM Plex Mono', monospace
        }

        .clear-btn {
            font-size: 8.5px;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--tx-3);
            background: none;
            border: 1px solid var(--bd);
            padding: 4px 9px;
            cursor: pointer;
            transition: all .12s
        }

        .clear-btn:hover {
            color: var(--danger);
            border-color: var(--danger)
        }

        .hist-list {
            display: flex;
            flex-direction: column;
            gap: 7px
        }

        .hist-empty {
            text-align: center;
            padding: 5rem 1rem;
            color: var(--tx-3);
            font-size: 10px;
            line-height: 2.8;
            white-space: pre-line;
            font-family: 'Space Grotesk', sans-serif
        }

        .hist-item {
            background: linear-gradient(135deg, var(--bg-s), var(--bg-r));
            border: 1px solid var(--bd);
            overflow: hidden;
            transition: border-color .13s
        }

        .hist-item:hover {
            border-color: var(--bd-m)
        }

        .hist-item.starred-border {
            border-color: var(--ac-bd)
        }

        .hist-item-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .65rem 1rem;
            border-bottom: 1px solid var(--bd);
            cursor: pointer;
            gap: 8px
        }

        .hist-item-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--tx)
        }

        .hist-item-right {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-shrink: 0
        }

        .hist-type {
            font-size: 7px;
            letter-spacing: .12em;
            text-transform: uppercase;
            padding: 2px 7px;
            border: 1px solid var(--bd);
            color: var(--tx-3)
        }

        .hist-time {
            font-size: 8.5px;
            color: var(--tx-3);
            font-family: 'IBM Plex Mono', monospace
        }

        .hist-star-btn {
            font-size: 14px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--tx-3);
            padding: 0 2px;
            line-height: 1;
            transition: color .13s
        }

        .hist-star-btn:hover,
        .hist-star-btn.on {
            color: var(--ac)
        }

        .hist-expanded {
            border-top: none
        }

        /* ── CREATIVE PASS ─────────────────────────────────────────────────── */

        /* Header — decorative rule with centered diamond glyph */
        .header-rule {
            display: flex;
            align-items: center;
            gap: 0;
            margin-top: 1.1rem;
            margin-bottom: -.5rem;
        }
        .header-rule-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--ac-d));
        }
        .header-rule-line.right {
            background: linear-gradient(90deg, var(--ac-d), transparent);
        }
        .header-rule-glyph {
            font-size: 8px;
            color: var(--ac);
            padding: 0 10px;
            letter-spacing: .2em;
        }

        /* Card header — inner top glow on loaded state */
        .card.brief-loaded .card-header {
            background: linear-gradient(180deg,
                rgba(200,160,80,.04) 0%,
                transparent 60%
            );
        }

        /* Brief headline — tighter tracking, slightly larger */
        .brief-val.headline {
            letter-spacing: .04em;
            font-size: 1.95rem;
        }

        /* Brief row — amber left bar sweeps in on hover */
        .brief-section {
            position: relative;
        }
        .brief-section::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 2px;

    <script>
        (function () {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');

            let particles = [];

            function resize() {
                canvas.width  = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function makeParticle(fromTop) {
                const sz = Math.random() * 3 + 1.5;
                return {
                    x:     Math.random() * canvas.width,
                    y:     fromTop ? -sz * 4 : Math.random() * canvas.height,
                    sz:    sz,
                    speed: Math.random() * 0.3 + 0.08,
                    alpha: Math.random() * 0.12 + 0.03,
                    rot:   Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.004,
                    drift: (Math.random() - 0.5) * 0.08,
                    col:   Math.random() < 0.6
                           ? [200, 160, 80]
                           : Math.random() < 0.5
                             ? [240, 208, 128]
                             : [160, 120, 50],
                };
            }

            function seed() {
                particles = [];
                const count = Math.floor(canvas.width / 14);
                for (let i = 0; i < count; i++) {
                    particles.push(makeParticle(false));
                }
            }

            function drawDiamond(x, y, sz, rot) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rot);
                ctx.beginPath();
                ctx.moveTo(0, -sz);
                ctx.lineTo(sz, 0);
                ctx.lineTo(0,  sz);
                ctx.lineTo(-sz, 0);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (const p of particles) {
                    p.y   += p.speed;
                    p.x   += p.drift;
                    p.rot += p.rotSpeed;

                    if (p.y > canvas.height + p.sz * 4) {
                        Object.assign(p, makeParticle(true));
                    }

                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = `rgb(${p.col[0]},${p.col[1]},${p.col[2]})`;
                    drawDiamond(p.x, p.y, p.sz, p.rot);
                }

                ctx.globalAlpha = 1;
                requestAnimationFrame(draw);
            }

            resize();
            seed();
            window.addEventListener('resize', () => { resize(); seed(); });
            requestAnimationFrame(draw);
        })();
    </script>

        /* ── Helpers ─────────────────────────────────────────────────────────────── */
        const pick = a => a[Math.floor(Math.random() * a.length)];
        function picks(a, n) { const c = [...a], r = []; for (let i = 0; i < Math.min(n, c.length); i++) { const x = Math.floor(Math.random() * c.length); r.push(c.splice(x, 1)[0]); } return r; }

        function genChar(locks = {}) {
            const g = (k, fn) => locks[k] !== undefined ? locks[k] : fn();
            const job = g("job", () => pick(W.jobs));
            const genre = g("genre", () => pick(W.genres));
            const theme = g("theme", () => pick(W.themes));
            return {
                job, genre, theme,
                race: g("race", () => pick(W.races)),
                culture: g("culture", () => pick(W.cultures)),
                pillars: g("pillars", () => picks(W.pillars, 3).join(", ")),
                shape: g("shape", () => pick(W.shapes)),
                colors: g("colors", () => picks(W.colors, 2).join(", ")),
                materials: g("materials", () => picks(W.materials, 2).join(", ")),
                prop: g("prop", () => pick(W.props)),
                worn: g("worn", () => pick(W.worn)),
                _histName: `${theme} ${job}`,
            };
        }
        function genEnv(locks = {}) {
            const g = (k, fn) => locks[k] !== undefined ? locks[k] : fn();
            const adj = g("envAdj", () => pick(W.envAdj));
            const noun = g("envNoun", () => pick(W.envNouns));
            return {
                name: `${adj.charAt(0).toUpperCase() + adj.slice(1)} ${noun.charAt(0).toUpperCase() + noun.slice(1)}`,
                envAdj: adj, envNoun: noun,
                biome: g("biome", () => pick(W.biomes)),
                genre: g("genre", () => pick(W.genres)),
                theme: g("theme", () => pick(W.themes)),
                culture: g("culture", () => pick(W.cultures)),
                pillars: g("pillars", () => picks(W.pillars, 3).join(", ")),
                time: g("time", () => pick(W.times)),
                condition: g("condition", () => pick(W.conditions)),
                scale: g("scale", () => pick(W.scales)),
                materials: g("materials", () => picks(W.materials, 2).join(", ")),
                color: g("color", () => pick(W.colorScripts)),
                fg: g("fg", () => pick(W.fgEls)),
                mg: g("mg", () => pick(W.mgEls)),
                bg: g("bg", () => pick(W.bgEls)),
                hero: g("hero", () => pick(W.heroProps)),
                buildingType: g("buildingType", () => pick(W.buildingTypes)),
                function: g("function", () => pick(W.envFunctions)),
                shape: g("shape", () => pick(W.shapes)),
                _histName: `${adj} ${noun}`,
            };
        }


        function copyBrief(type, d) {
            const maps = {
                character: [["Role", d.job], ["Race", d.race], ["Genre", d.genre], ["Theme", d.theme], ["Culture", d.culture], ["Pillars", d.pillars], ["Shape", d.shape], ["Colors", d.colors], ["Materials", d.materials], ["Key Prop", d.prop], ["Worn Detail", d.worn]],
                environment: [["Building Type", d.buildingType], ["Role & Function", d.function], ["Biome", d.biome], ["Genre", d.genre], ["Theme", d.theme], ["Culture", d.culture], ["Pillars", d.pillars], ["Time", d.time], ["Condition", d.condition], ["Scale", d.scale], ["Materials", d.materials], ["Color Script", d.color], ["Hero Prop", d.hero]],
            };
            const label = d.job || d.name || d.title;
            const lines = [`=== ${type.toUpperCase()} BRIEF — ${label} ===`, ""];
            (maps[type] || []).forEach(([k, v]) => v && lines.push(`${k}: ${v}`));
            navigator.clipboard.writeText(lines.join("\n")).catch(() => { });
        }

        /* Loading screen  */
        function Particles() {
            const [pts] = useState(() => Array.from({ length: 32 }, (_, i) => ({
                id: i,
                x: 2 + (i * (96 / 32)) + (Math.random() * 6 - 3),
                sz: Math.random() * 3.5 + 2,

            return (

                    {pts.map(p => (
                        <div key={p.id} className="ptcl" style={{
                            left: `${p.x}%`, bottom: '-6px',

                        }} />

        /* Sigil — a self-drawing geometric seal. All paths use stroke-dashoffset animation. */
        function Sigil({ progress }) {
            // progress 0..1 controls how many lines have drawn in
            // We define line segments as SVG paths in draw order
            // viewBox 600x600, center 300,300
            const C = 300, R1 = 240, R2 = 160, R3 = 90, R4 = 40;

            // Octagon points at R1
            const oct = Array.from({length:8},(_,i)=>{
                const a = (i*45 - 90) * Math.PI/180;
                return [C + R1*Math.cos(a), C + R1*Math.sin(a)];
            });
            // Square points at R2 (rotated 45)
            const sq = Array.from({length:4},(_,i)=>{
                const a = (i*90) * Math.PI/180;
                return [C + R2*Math.cos(a), C + R2*Math.sin(a)];
            });
            // Diamond points at R3
            const dia = Array.from({length:4},(_,i)=>{
                const a = (i*90 - 45) * Math.PI/180;
                return [C + R3*Math.cos(a), C + R3*Math.sin(a)];
            });

            const octPath = oct.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ')+'Z';
            const sqPath  = sq.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ')+'Z';
            const diaPath = dia.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ')+'Z';

            // Cross lines (axis)
            const crossLines = [
                `M${C},${C-R1} L${C},${C+R1}`,
                `M${C-R1},${C} L${C+R1},${C}`,
                `M${C-R1*0.707},${C-R1*0.707} L${C+R1*0.707},${C+R1*0.707}`,
                `M${C+R1*0.707},${C-R1*0.707} L${C-R1*0.707},${C+R1*0.707}`,
            ];

            // Spoke connectors oct to sq
            const spokes = oct.map((op,i)=>{
                const sq_i = i % 4;
                return `M${op[0]},${op[1]} L${sq[sq_i][0]},${sq[sq_i][1]}`;
            });

            const segs = [
                // 0-1: outer octagon (two halves)
                {d: oct.slice(0,5).map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' '), l:1200, delay:.05, dur:.5, dim:false},
                {d: oct.slice(4).concat([oct[0]]).map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' '), l:1200, delay:.1, dur:.5, dim:false},
                // 2-3: axis lines
                {d:crossLines[0], l:480, delay:.45, dur:.3, dim:true},
                {d:crossLines[1], l:480, delay:.5, dur:.3, dim:true},
                {d:crossLines[2], l:480, delay:.55, dur:.3, dim:true},
                {d:crossLines[3], l:480, delay:.6, dur:.3, dim:true},
                // 4: inner square
                {d:sqPath, l:900, delay:.7, dur:.45, dim:false},
                // 5-8: spokes
                ...spokes.map((s,i)=>({d:s, l:220, delay:.85+i*.04, dur:.2, dim:true})),
                // 9: inner diamond
                {d:diaPath, l:500, delay:1.15, dur:.35, dim:false},
            ];

            const dots = [
                ...oct.map(p=>({cx:p[0],cy:p[1],r:3,delay:1.4})),
                ...sq.map(p=>({cx:p[0],cy:p[1],r:4,delay:1.45})),
                ...dia.map(p=>({cx:p[0],cy:p[1],r:3,delay:1.5})),
                {cx:C,cy:C,r:6,delay:1.55},
            ];

            return (
                <div className="sigil-wrap">
                    <svg className="sigil-svg" width="300" height="300" viewBox="100 100 400 400" xmlns="http://www.w3.org/2000/svg">
                        {/* dim background guide lines */}
                        {crossLines.map((d,i)=>(
                            <path key={`g${i}`} d={d} className="sigil-line-dim" strokeWidth=".5" opacity=".3"/>
                        ))}
                        {/* animated draw segments */}
                        {segs.map((s,i)=>(
                            <path key={`s${i}`} d={s.d}
                                className={`sigil-line sigil-draw ${s.dim?'sigil-line-dim':''}`}
                                strokeWidth={s.dim?".75":"1.2"}
                                style={{"--l":s.l,"--delay":`${s.delay}s`,"--d":`${s.dur}s`}}
                                stroke={s.dim?"#4A3810":"#C8A050"}
                            />
                        ))}
                        {/* glow layer — same paths, blurred */}
                        <g filter="url(#glow)">
                            <path d={octPath} fill="none" stroke="#C8A050" strokeWidth="1.5" className="sigil-draw" style={{"--l":1900,"--delay":"0s","--d":"1s"}} opacity=".35"/>
                            <path d={sqPath} fill="none" stroke="#C8A050" strokeWidth="1" className="sigil-draw" style={{"--l":900,"--delay":".65s","--d":".5s"}} opacity=".3"/>
                            <path d={diaPath} fill="none" stroke="#C8A050" strokeWidth="1" className="sigil-draw" style={{"--l":500,"--delay":"1.1s","--d":".4s"}} opacity=".3"/>
                        </g>
                        {/* intersection dots */}
                        {dots.map((d,i)=>(
                            <circle key={`d${i}`} cx={d.cx} cy={d.cy} r={d.r}
                                className="sigil-dot sigil-fade"
                                style={{"--delay":`${d.delay}s`}}
                                opacity=".9"
                            />
                        ))}
                        {/* center diamond */}
                        <rect x={C-10} y={C-10} width="20" height="20" fill="none" stroke="#C8A050" strokeWidth="1"
                            transform={`rotate(45 ${C} ${C})`}
                            className="sigil-draw" style={{"--l":80,"--delay":"1.5s","--d":".25s"}}/>
                        <rect x={C-4} y={C-4} width="8" height="8"
                            fill="#C8A050" opacity=".9"
                            transform={`rotate(45 ${C} ${C})`}
                            className="sigil-fade" style={{"--delay":"1.65s"}}/>
                        <defs>
                            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                                <feGaussianBlur stdDeviation="4" result="blur"/>
                                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                            </filter>
                        </defs>
                    </svg>
                </div>
            );
        }
        function LoadingScreen({ onDone }) {
            const [lines, setLines] = useState([]);
            const [pct, setPct] = useState(0);
            const [done, setDone] = useState(false);
            useEffect(() => {
                BOOT.forEach(({ t, ok, type, delay }, i) => {
                    setTimeout(() => {
                        setLines(l => [...l, { t, ok, type, final: i === BOOT.length - 1 }]);
                        setPct(Math.round(((i + 1) / BOOT.length) * 100));
                        if (i === BOOT.length - 1) { setDone(true); setTimeout(onDone, 800); }
                    }, delay);
                });
            }, []);
            return (
                <div className="loading-screen">
                    <div className="loading-bg-glow" />
                    <Particles />
                    <Sigil />
                    <div className="loading-panel">
                        <div className="loading-border">
                            <div className="lc tl" /><div className="lc tr" />
                            <div className="lc bl" /><div className="lc br" />
                        </div>
                        <div className="loading-logo">Brief Generator<span>/ AAA</span></div>
                        <div className="loading-build">concept art studio — build 3.0</div>
                        <div className="loading-divider" />
                        <div className="loading-terminal">
                            {lines.map((l, i) => (
                                <div key={i} className={`loading-line${l.type ? ' ' + l.type : ''}${l.final && done ? ' done' : ''}`}>
                                    <span className="loading-prompt">&gt;</span>
                                    <span className="loading-txt">{l.t}</span>
                                    {l.ok && <span className="loading-status">[OK] {l.ok}</span>}
                                </div>
                            ))}
                            {!done && <div className="loading-cursor">_</div>}
                        </div>
                        <div className="loading-bar-wrap">
                            <div className="loading-bar-track">
                                <div className="loading-bar-fill" style={{ width: `${pct}%` }} />
                            </div>
                        </div>
                        <div className="loading-footer">
                            <span>brief gen / aaa — offline build</span>
                            <span className="loading-pct">{pct}%</span>
                        </div>
                    </div>
                </div>
            );
        }

        /* Brief components  */
        function EmptyState({ desc }) {
            const S = 80, C = 40;
            // diamond = rotated square. points at radius r from center
            const diamond = (r) => `${C},${C-r} ${C+r},${C} ${C},${C+r} ${C-r},${C}`;
            return (
                <div className="empty-state">
                    <div className="empty-orb">
                        <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`} overflow="visible" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <filter id="orb-glow" x="-60%" y="-60%" width="220%" height="220%">
                                    <feGaussianBlur stdDeviation="2.5" result="b"/>
                                    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                                </filter>
                            </defs>

                            {/* crosshair ticks — static */}
                            {[[C,C-38,C,C-30],[C,C+30,C,C+38],[C-38,C,C-30,C],[C+30,C,C+38,C]].map(([x1,y1,x2,y2],i)=>(
                                <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
                                    stroke="#4A3810" strokeWidth="1" className="orb-tick" />
                            ))}

                            {/* outer diamond — slow CW spin */}
                            <g className="orb-outer">
                                <polygon points={diamond(35)}
                                    fill="none" stroke="#C8A050" strokeWidth="1" opacity=".28"/>
                                {/* orbital dot on outer */}
                                <polygon points={`${C},${C-37} ${C+3},${C-34} ${C},${C-31} ${C-3},${C-34}`}
                                    fill="#C8A050" filter="url(#orb-glow)" opacity=".9"/>
                            </g>

                            {/* mid diamond — CCW spin */}
                            <g className="orb-mid">
                                <polygon points={diamond(22)}
                                    fill="none" stroke="#C8A050" strokeWidth=".75" opacity=".18"/>
                                {/* orbital dot on mid, offset corner */}
                                <polygon points={`${C+22},${C} ${C+25},${C+3} ${C+22},${C+6} ${C+19},${C+3}`}
                                    fill="#C8A050" opacity=".55"/>
                            </g>

                            {/* inner breathing diamond */}
                            <g className="orb-core" filter="url(#orb-glow)">
                                <polygon points={diamond(11)}
                                    fill="rgba(200,160,80,0.06)" stroke="#C8A050" strokeWidth="1" opacity=".8"/>
                            </g>

                            {/* center pip */}
                            <polygon points={`${C},${C-4} ${C+4},${C} ${C},${C+4} ${C-4},${C}`}
                                fill="#C8A050" className="orb-center" filter="url(#orb-glow)"/>
                        </svg>
                    </div>
                    <div className="empty-label">awaiting brief</div>
                    <div className="empty-desc">{desc}</div>
                    <div className="empty-drift">◆ ◆ ◆</div>
                </div>
            );
        }
        function Cell({ fk, label, val, headline, pillars, locked, onToggle }) {
            if (!val) return null;
            return (
                <div className={`brief-cell${locked ? " locked" : ""}`} onClick={() => onToggle(fk, val)} title={locked ? "click to unlock" : "click to lock"}>
                    <div className="brief-key">{label}{locked && <span className="lock-pip">●</span>}</div>
                    {pillars
                        ? <div className="brief-val pill-row">{String(val).split(",").map(p => <span key={p} className="pillar-tag">{p.trim()}</span>)}</div>
                        : <div className={`brief-val${headline ? " headline" : ""}`}>{val}</div>}
                </div>
            );
        }
        function Brief({ sections, locks = {}, onToggle = () => { } }) {
            return (
                <div className="brief">
                    {sections.map((row, i) => (
                        <div key={i} className={`brief-section c${Math.max(1, row.filter(f => f.val).length)}`} style={{ "--row-i": i }}>
                            {row.map(f => <Cell key={f.fk} {...f} locked={!!locks[f.fk]} onToggle={onToggle} />)}
                        </div>
                    ))}
                </div>
            );
        }
        function CharBrief({ d, locks, onToggle }) {
            return <Brief locks={locks} onToggle={onToggle} sections={[
                [{ fk: "job", label: "role / function", val: d.job, headline: true }],
                [{ fk: "race", label: "race / lineage", val: d.race }],
                [{ fk: "genre", label: "genre", val: d.genre }, { fk: "theme", label: "theme", val: d.theme }, { fk: "culture", label: "culture", val: d.culture }],
                [{ fk: "pillars", label: "design pillars", val: d.pillars, pillars: true }],
                [{ fk: "shape", label: "shape language", val: d.shape }],
                [{ fk: "colors", label: "primary colors", val: d.colors }, { fk: "materials", label: "materials", val: d.materials }],
                [{ fk: "prop", label: "key prop / weapon", val: d.prop }, { fk: "worn", label: "worn detail", val: d.worn }],
            ]} />;
        }
        function EnvBrief({ d, locks, onToggle }) {
            return <Brief locks={locks} onToggle={onToggle} sections={[
                [{ fk: "buildingType", label: "building type", val: d.buildingType, headline: true }],
                [{ fk: "function", label: "role & function", val: d.function }],
                [{ fk: "biome", label: "biome", val: d.biome }, { fk: "genre", label: "genre", val: d.genre }, { fk: "theme", label: "theme", val: d.theme }],
                [{ fk: "culture", label: "cultural influence", val: d.culture }],
                [{ fk: "pillars", label: "design pillars", val: d.pillars, pillars: true }],
                [{ fk: "shape", label: "shape language", val: d.shape }],
                [{ fk: "condition", label: "condition", val: d.condition }, { fk: "scale", label: "scale", val: d.scale }],
                [{ fk: "materials", label: "materials", val: d.materials }, { fk: "color", label: "color script", val: d.color }],
                [{ fk: "hero", label: "hero prop / landmark", val: d.hero }],
            ]} />;
        }

        function HistItem({ item, onStar }) {
            const [open, setOpen] = useState(false);
            const t = new Date(item.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
            return (
                <div className={`hist-item${item.starred ? " starred-border" : ""}`} data-type={item.type}>
                    <div className="hist-item-top" onClick={() => setOpen(o => !o)}>
                        <span className="hist-item-name">{item.name}</span>
                        <div className="hist-item-right">
                            <span className="hist-type">{item.type}</span>
                            <span className="hist-time">{t}</span>
                            <button className={`hist-star-btn${item.starred ? " on" : ""}`} onClick={e => { e.stopPropagation(); onStar(item.id); }}>{item.starred ? "★" : "☆"}</button>
                        </div>
                    </div>
                    {open && (
                        <div className="hist-expanded">
                            {item.type === "character" && <CharBrief d={item.data} locks={{}} onToggle={() => { }} />}
                            {item.type === "environment" && <EnvBrief d={item.data} locks={{}} onToggle={() => { }} />}
                        </div>
                    )}
                </div>
            );
        }
        /* Walkthrough tour  */
        const TOUR_STEPS = [
            {
                title: "Welcome",
                desc: "Brief Generator is a concept art tool built for character designers and environment artists. Every roll gives you a fully structured brief — the same format used at AAA studios and film productions.",
                tip: "The whole app runs offline. No login, no API key, no internet required once loaded.",
            },
            {
                title: "Rolling a brief",
                desc: "Hit <strong>roll brief ↻</strong> on any card to generate. Each brief pulls from large word banks across genre, theme, culture, shape language, materials, and more — thousands of possible combinations.",
                tip: "Every roll is instant. Hit it as many times as you want until something sparks.",
            },
            {
                title: "Locking fields",
                desc: "Click any field in a brief to <strong>lock it</strong> — it turns blue. Locked fields stay fixed on the next roll. Everything else regenerates. Lock the genre you like, reroll the shape language. Lock the culture, reroll the materials.",
                tip: "The lock count badge in the card header shows how many fields are currently pinned.",
            },
            {
                title: "Starring briefs",
                desc: "Hit <strong>☆</strong> on any generated brief to star it. Starred briefs are saved to your browser's local storage — they survive page refreshes and come back the next time you open the tool.",
                tip: "Check the Starred tab to see all your saved briefs grouped together.",
            },
            {
                title: "History",
                desc: "Every brief you roll is automatically logged in the <strong>History tab</strong>. You can filter by character or environment, expand any entry to see the full brief, and star anything worth keeping.",
                tip: "History stores up to 100 briefs per session. Starred briefs persist indefinitely.",
            },
            {
                title: "Copying a brief",
                desc: "Hit <strong>copy brief</strong> to copy the full brief to your clipboard as plain text — ready to paste into Notion, a Discord, a reference doc, or your sketchbook notes.",
                tip: "The copy includes every field label and value, formatted cleanly for easy reading.",
            },
            {
                title: "You're ready",
                desc: "That's everything. Roll briefs, lock what you like, reroll the rest, star the ones worth drawing. Every field — including race, culture, and materials — is lockable independently. The tool gets you to a pencil faster. The design is still yours.",
                tip: "The brief is a constraint, not a script. Two artists given the same brief will produce completely different work. Your interpretation is the art.",
            },
        ];

        function Tour({ onClose }) {
            const [step, setStep] = useState(0);
            const s = TOUR_STEPS[step];
            const isLast = step === TOUR_STEPS.length - 1;
            return (
                <div className="tour-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
                    <div className="tour-panel">
                        <div className="tour-header">
                            <div className="tour-header-left">
                                <span className="tour-step-num">{String(step + 1).padStart(2,'0')} / {String(TOUR_STEPS.length).padStart(2,'0')}</span>
                                <span className="tour-title">{s.title}</span>
                            </div>
                            <button className="tour-close" onClick={onClose}>✕</button>
                        </div>
                        <div className="tour-body">
                            <p className="tour-desc" dangerouslySetInnerHTML={{ __html: s.desc }} />
                            <div className="tour-tip">{s.tip}</div>
                        </div>
                        <div className="tour-footer">
                            <div className="tour-dots">
                                {TOUR_STEPS.map((_, i) => (
                                    <div key={i} className={`tour-dot${i === step ? ' active' : ''}`}
                                        onClick={() => setStep(i)} style={{cursor:'pointer'}} />
                                ))}
                            </div>
                            <div style={{ display:'flex', gap:8 }}>
                                {step > 0 && <button className="tour-prev" onClick={() => setStep(s => s - 1)}>← back</button>}
                                <button className="tour-next" onClick={() => isLast ? onClose() : setStep(s => s + 1)}>
                                    {isLast ? "let's go →" : "next →"}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function StatusBar({ tab, history }) {
            const total = history.length;
            const starred = history.filter(h => h.starred).length;
            const last = history[0];
            function timeAgo(ts) {
                const s = Math.floor((Date.now() - ts) / 1000);
                if (s < 60) return `${s}s ago`;
                if (s < 3600) return `${Math.floor(s/60)}m ago`;
                return `${Math.floor(s/3600)}h ago`;
            }
            return (
                <div className="status-bar">
                    <div className="status-seg">
                        <div className="status-dot" />
                        <span className="status-val">{total > 0 ? "active" : "ready"}</span>
                    </div>
                    <div className="status-seg"><span>session</span><span className="status-val">{total} brief{total !== 1 ? "s" : ""}</span></div>
                    {last && <div className="status-seg"><span>last</span><span className="status-val">{last.type} - {timeAgo(last.ts)}</span></div>}
                    {starred > 0 && <div className="status-seg"><span>★</span><span className="status-val">{starred}</span></div>}
                    <div className="status-seg"><span>tab</span><span className="status-val">{tab}</span></div>
                    <div className="status-seg"><span className="status-brand" style={{ color: "var(--ac-d)" }}>brief gen / aaa</span></div>
                </div>
            );
        }

        /* App  */
        function App() {
            const [loaded, setLoaded] = useState(false);
            const didLoad = React.useRef(false);
            const [tour, setTour] = useState(false);
            const [tab, setTab] = useState("generate");
            const [results, setResults] = useState({ char: null, env: null, illus: null });
            const [locks, setLocks] = useState({ char: {}, env: {}, illus: {} });
            const [history, setHistory] = useState([]);
            const [starredBriefs, setStarredBriefs] = useState([]);
            const [histFilter, setHistFilter] = useState("all");
            const [copied, setCopied] = useState({ char: false, env: false, illus: false });
            const [lastHistId, setLastHistId] = useState({ char: null, env: null, illus: null });

            useEffect(() => {
                const s = store.get(STAR_KEY); if (s) { try { setStarredBriefs(JSON.parse(s)); } catch { } }
                const h = store.get(HIST_KEY); if (h) { try { setHistory(JSON.parse(h)); } catch { } }
            }, []);
            useEffect(() => { if (loaded) store.set(STAR_KEY, JSON.stringify(starredBriefs)); }, [starredBriefs, loaded]);
            useEffect(() => { if (loaded) store.set(HIST_KEY, JSON.stringify(history.slice(0, 100))); }, [history, loaded]);

            function toggleLock(cardKey, fk, val) {
                setLocks(prev => { const c = { ...prev[cardKey] }; if (c[fk]) delete c[fk]; else c[fk] = val; return { ...prev, [cardKey]: c }; });
            }
            function addToHistory(type, name, data, cardKey) {
                const id = Date.now();
                setHistory(h => [{ id, ts: id, type, name, data, starred: false }, ...h].slice(0, 100));
                if (cardKey) setLastHistId(l => ({ ...l, [cardKey]: id }));
            }
            function starHistoryItem(id) {
                setHistory(h => h.map(i => {
                    if (i.id !== id) return i;
                    const ns = !i.starred;
                    if (ns) setStarredBriefs(sb => sb.find(s => s.id === id) ? sb : [{ ...i, starred: true }, ...sb]);
                    else setStarredBriefs(sb => sb.filter(s => s.id !== id));
                    return { ...i, starred: ns };
                }));
            }
            function unstar(id) { setStarredBriefs(sb => sb.filter(s => s.id !== id)); setHistory(h => h.map(i => i.id === id ? { ...i, starred: false } : i)); }
            function gen(key) {
                const d = key === "char" ? genChar(locks[key]) : genEnv(locks[key]);
                const type = key === "char" ? "character" : "environment";
                const histName = d._histName || d.job || d.name;
                setResults(r => ({ ...r, [key]: d }));
                addToHistory(type, histName, d, key);
            }
            function handleCopy(key, type) { const d = results[key]; if (!d) return; copyBrief(type, d); setCopied(c => ({ ...c, [key]: true })); setTimeout(() => setCopied(c => ({ ...c, [key]: false })), 1500); }

            const CARDS = [
                { key: "char", type: "character", num: "01", title: "Character", badge: "char brief", desc: "role, race, genre, theme, culture, shape, colors, materials", BC: CharBrief },
                { key: "env", type: "environment", num: "02", title: "Environment", badge: "env brief", desc: "role, biome, genre, culture, shape, materials, hero prop", BC: EnvBrief },
            ];
            const filteredHist = history.filter(h => {
                if (histFilter === "all") return true;
                if (histFilter === "starred") return h.starred;
                return h.type === histFilter;
            });

            if (!loaded) return <LoadingScreen onDone={() => setLoaded(true)} />;

            return (
                <>
                    {tour && <Tour onClose={() => setTour(false)} />}
                    <StatusBar tab={tab} history={history} />
                    <div className="app">
                        <div className="header">
                            <div>
                                <div className="header-eyebrow">concept art studio</div>
                                <div className="header-title">Brief Generator <span>/ AAA</span></div>
                            </div>
                            <button className="tour-btn" onClick={() => setTour(true)} style={{alignSelf:'flex-end', marginBottom:'4px'}}>? how to use</button>
                        </div>
                        <div className="header-rule">
                            <div className="header-rule-line" />
                            <div className="header-rule-glyph">◆ &nbsp; vestige &nbsp; ◆</div>
                            <div className="header-rule-line right" />
                        </div>
                        <div className="tab-bar">
                            <button className={`tab${tab === "generate" ? " active" : ""}`} onClick={() => setTab("generate")}>generate</button>
                            <button className={`tab${tab === "starred" ? " active" : ""}`} onClick={() => setTab("starred")}>starred{starredBriefs.length ? ` (${starredBriefs.length})` : ""}</button>
                            <button className={`tab${tab === "history" ? " active" : ""}`} onClick={() => setTab("history")}>history{history.length ? ` (${history.length})` : ""}</button>
                        </div>

                        {tab === "generate" && (
                            <div className="cards">
                                {CARDS.map(c => {
                                    const d = results[c.key], cl = locks[c.key], lc = Object.keys(cl).length;
                                    const histId = lastHistId[c.key];
                                    const isStarred = histId ? !!history.find(h => h.id === histId)?.starred : false;
                                    return (
                                        <div key={c.key} className={`card${d ? " brief-loaded" : ""}`}>
                                            <div className="card-header">
                                                <div className="card-left">
                                                    <span className="card-num">{c.num}</span>
                                                    <span className="card-title">{c.title}</span>
                                                    <span className="card-badge">{c.badge}</span>
                                                    {lc > 0 && <span className="lock-count">{lc} locked</span>}
                                                </div>
                                                <div className="card-actions">
                                                    {d && <button className={`star-btn${isStarred ? " on" : ""}`} onClick={() => histId && starHistoryItem(histId)}>{isStarred ? "★" : "☆"}</button>}
                                                    {d && <button className={`action-btn${copied[c.key] ? " ok" : ""}`} onClick={() => handleCopy(c.key, c.type)}>{copied[c.key] ? "copied ✓" : "copy brief"}</button>}
                                                    {lc > 0 && <button className="action-btn" onClick={() => setLocks(l => ({ ...l, [c.key]: {} }))}>clear locks</button>}
                                                    <button className="gen-btn" onClick={() => gen(c.key)}>roll brief ↻</button>
                                                </div>
                                            </div>
                                            {d ? <c.BC d={d} locks={cl} onToggle={(fk, val) => toggleLock(c.key, fk, val)} /> : <EmptyState desc={c.desc} />}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {tab === "starred" && (
                            <div>
                                {starredBriefs.length === 0
                                    ? <div className="hist-empty">nothing starred yet.{"\n"}star any brief and it will persist here.</div>
                                    : <div className="hist-list">{starredBriefs.map(item => <HistItem key={item.id} item={{ ...item, starred: true }} onStar={() => unstar(item.id)} />)}</div>
                                }
                            </div>
                        )}

                        {tab === "history" && (
                            <div>
                                <div className="hist-filters">
                                    {["all", "character", "environment", "starred"].map(f => (
                                        <button key={f} className={`hist-filter-btn${histFilter === f ? " active" : ""}`} onClick={() => setHistFilter(f)}>{f}</button>
                                    ))}
                                </div>
                                {filteredHist.length === 0
                                    ? <div className="hist-empty">{history.length === 0 ? "nothing here yet.\nroll some briefs and they'll show up." : "no briefs match this filter."}</div>
                                    : <>
                                        <div className="hist-toolbar">
                                            <span className="hist-count">{filteredHist.length} brief{filteredHist.length !== 1 ? "s" : ""}</span>
                                            <button className="clear-btn" onClick={() => { setHistory([]); store.set(HIST_KEY, '[]'); }}>clear history</button>
                                        </div>
                                        <div className="hist-list">{filteredHist.map(item => <HistItem key={item.id} item={item} onStar={starHistoryItem} />)}</div>
                                    </>
                                }
                            </div>
                        )}
                    </div>
                </>
            );
        }
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
