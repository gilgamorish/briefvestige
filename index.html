<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Brief Generator / AAA</title>
    <meta name="theme-color" content="#07070E">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vestige">

    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2307070E'/><polygon points='50,8 92,50 50,92 8,50' fill='none' stroke='%23C8A050' stroke-width='6'/><polygon points='50,24 76,50 50,76 24,50' fill='none' stroke='%23C8A050' stroke-width='3' opacity='0.5'/><polygon points='50,38 62,50 50,62 38,50' fill='%23C8A050'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg: #07070E;
            --bg-s: #0C0D1A;
            --bg-r: #111220;
            --bg-h: #191A2C;
            --bd: #252640;
            --bd-m: #383A58;
            --tx: #F2EAD4;
            --tx-2: #9A8C6C;
            --tx-3: #4A4638;
            --ac: #C8A050;
            --ac-l: #F0D080;
            --ac-d: #7A6028;
            --ac-bg: rgba(200, 160, 80, .10);
            --ac-bd: rgba(200, 160, 80, .28);
            --blue: #4A90B8;
            --blue-bg: rgba(74, 144, 184, .10);
            --blue-bd: rgba(74, 144, 184, .28);
            --ok: #60A070;
            --ok-bg: rgba(96, 160, 112, .10);
            --danger: #C05040;
            --r: 2px;
            --R: 3px
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--tx);
            min-height: 100vh;
            font-size: 13px;
            overflow-x: hidden
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bd-m)
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(200, 160, 80, .05) 1px, transparent 1px);
            background-size: 36px 36px
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse 70% 50% at 10% 10%, rgba(200, 160, 80, .05) 0%, transparent 55%), radial-gradient(ellipse 60% 50% at 90% 90%, rgba(74, 144, 184, .05) 0%, transparent 55%)
        }

        #starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 5rem
        }

        /* Header */
        .header {
            margin-bottom: 2rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--bd);
            position: relative;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header::before {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 60px;
            height: 1px;
            background: var(--ac)
        }

        .header::after {
            content: '▪';
            position: absolute;
            bottom: -5px;
            left: 58px;
            font-size: 6px;
            color: var(--ac)
        }

        .header-eyebrow {
            font-size: 10.5px;
            letter-spacing: .32em;
            text-transform: uppercase;
            color: var(--ac-d);
            font-family: 'IBM Plex Mono', monospace;
            margin-bottom: 8px
        }

        .header-eyebrow::before {
            content: '[ ';
            color: var(--ac)
        }

        .header-eyebrow::after {
            content: ' ]';
            color: var(--ac)
        }

        .header-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--ac-l);
            line-height: 1
        }

        .header-title span {
            font-family: 'IBM Plex Mono', monospace;
            font-size: .75rem;
            font-weight: 300;
            letter-spacing: .3em;
            color: var(--tx-3);
            vertical-align: middle;
            margin-left: 10px
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--bd);
            margin-bottom: 1.75rem
        }

        .tab {
            font-size: 10.5px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--tx-3);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            padding: .6rem 1.2rem;
            cursor: pointer;
            margin-bottom: -1px;
            transition: all .2s
        }

        .tab:hover {
            color: var(--tx-2)
        }

        .tab.active {
            color: var(--ac);
            border-bottom-color: var(--ac)
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--ac);
            box-shadow: 0 0 6px var(--ac)
        }

        .tab {
            position: relative
        }

        /* Cards */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 1.25rem
        }

        .card {
            background: linear-gradient(160deg, var(--bg-s) 0%, var(--bg-r) 100%);
            border: 1px solid var(--bd);
            border-radius: var(--R);
            position: relative;
            overflow: visible;
            transition: border-color .25s, box-shadow .25s
        }

        .card:hover {
            border-color: var(--bd-m)
        }

        .card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            width: 16px;
            height: 16px;
            border-top: 1px solid var(--ac);
            border-left: 1px solid var(--ac);
            z-index: 2
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -1px;
            right: -1px;
            width: 16px;
            height: 16px;
            border-bottom: 1px solid var(--ac-d);
            border-right: 1px solid var(--ac-d);
            z-index: 2
        }

        .card.brief-loaded {
            border-color: rgba(200, 160, 80, .22);
            box-shadow: 0 0 28px rgba(200, 160, 80, .07)
        }

        .card.brief-loaded::before {
            border-color: var(--ac);
            animation: cg 3s ease-in-out infinite
        }

        .card.brief-loaded::after {
            border-color: var(--ac);
            animation: cg 3s ease-in-out .6s infinite
        }

        @keyframes cg {

            0%,
            100% {
                box-shadow: -2px -2px 5px rgba(200, 160, 80, .1)
            }

            50% {
                box-shadow: -2px -2px 10px rgba(200, 160, 80, .35)
            }
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .75rem 1.2rem;
            border-bottom: 1px solid var(--bd);
            gap: 8px;
            flex-wrap: wrap;
            background: linear-gradient(135deg, rgba(255, 255, 255, .02) 0%, transparent 100%);
            position: relative;
            overflow: hidden
        }

        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--ac-bd), transparent)
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .card-num {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--ac);
            min-width: 24px;
            letter-spacing: .08em;
            background: var(--ac-bg);
            border: 1px solid var(--ac-bd);
            padding: 2px 6px;
            text-align: center;
            box-shadow: 0 0 6px rgba(200, 160, 80, .12)
        }

        .card-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: .95rem;
            font-weight: 700;
            color: var(--tx);
            letter-spacing: .14em;
            text-transform: uppercase
        }

        .lock-count {
            font-size: 9px;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: 2px 8px;
            background: var(--blue-bg);
            color: var(--blue);
            border: 1px solid var(--blue-bd)
        }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap
        }

        .action-btn {
            font-size: 11px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .06em;
            color: #8A8070;
            background: none;
            border: 1px solid #353650;
            padding: 6px 12px;
            cursor: pointer;
            transition: all .13s;
            white-space: nowrap
        }

        .action-btn:hover {
            color: var(--tx);
            border-color: #5A5C80;
            background: var(--bg-h)
        }

        .action-btn.ok {
            color: var(--ok)
        }

        .gen-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: .18em;
            text-transform: uppercase;
            font-weight: 700;
            color: #06060C;
            background: linear-gradient(105deg, #6A500A 0%, #C89838 28%, #F0D070 50%, #C89838 72%, #6A500A 100%);
            background-size: 250% auto;
            border: none;
            padding: 8px 20px;
            cursor: pointer;
            transition: opacity .13s, transform .1s, box-shadow .2s;
            animation: btn-shim 2.5s linear infinite;
            box-shadow: 0 2px 14px rgba(200, 160, 80, .3)
        }

        .gen-btn:hover {
            opacity: .88;
            box-shadow: 0 2px 22px rgba(200, 160, 80, .5);
            transform: translateY(-1px)
        }

        .gen-btn:active {
            transform: scale(.97)translateY(0)
        }

        @keyframes btn-shim {
            to {
                background-position: -250% center
            }
        }

        .star-btn {
            font-size: 18px;
            background: none;
            border: 1px solid #353650;
            cursor: pointer;
            color: #8A8070;
            padding: 4px 9px;
            line-height: 1;
            transition: all .13s
        }

        .star-btn:hover {
            color: var(--ac);
            border-color: var(--ac-bd)
        }

        .star-btn.on {
            color: var(--ac);
            border-color: var(--ac-bd);
            background: var(--ac-bg)
        }

        /* Brief grid */
        .brief {
            display: flex;
            flex-direction: column
        }

        .brief-section {
            display: grid;
            border-bottom: 1px solid var(--bd);
            opacity: 0;
            transform: translateY(4px);
            animation: ri .3s ease forwards;
            animation-delay: calc(var(--row-i, 0)*50ms)
        }

        .brief-section:last-child {
            border-bottom: none
        }

        .brief-section.c1 {
            grid-template-columns: 1fr
        }

        .brief-section.c2 {
            grid-template-columns: 1fr 1fr
        }

        .brief-section.c3 {
            grid-template-columns: 1fr 1fr 1fr
        }

        @keyframes ri {
            to {
                opacity: 1;
                transform: none
            }
        }

        .brief-cell {
            padding: .65rem 1.1rem;
            border-right: 1px solid var(--bd);
            cursor: pointer;
            transition: background .11s;
            position: relative
        }

        .brief-cell:last-child {
            border-right: none
        }

        .brief-cell:hover {
            background: rgba(255, 255, 255, .025)
        }

        .brief-cell.locked {
            background: var(--blue-bg)
        }

        .brief-cell.locked:hover {
            background: rgba(74, 144, 184, .12)
        }



        .brief-cell.locked:hover::before {
            background: var(--blue)
        }

        .brief-key {
            font-size: 10px;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: #7A7260;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'IBM Plex Mono', monospace
        }

        .brief-key::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 1px;
            background: linear-gradient(90deg, var(--ac-d), transparent);
            flex-shrink: 0
        }

        .brief-cell.locked .brief-key {
            color: var(--blue)
        }

        .brief-cell.locked .brief-key::before {
            background: linear-gradient(90deg, var(--blue), transparent)
        }

        .lock-pip {
            font-size: 5px;
            color: var(--blue);
            margin-left: 2px
        }

        .brief-val {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13.5px;
            color: var(--tx);
            line-height: 1.5;
            font-weight: 400
        }

        .brief-val.headline {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--ac-l);
            line-height: 1.1
        }

        .brief-val.pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 3px
        }

        .pillar-tag {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            padding: 3px 10px;
            background: linear-gradient(135deg, rgba(200, 160, 80, .14), rgba(200, 160, 80, .04));
            border-top: 1px solid rgba(200, 160, 80, .32);
            border-left: 1px solid rgba(200, 160, 80, .14);
            border-right: 1px solid rgba(200, 160, 80, .14);
            border-bottom: 1px solid transparent;
            color: var(--ac-l);
            letter-spacing: .12em;
            text-transform: uppercase
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3.5rem 1rem;
            gap: 14px;
            position: relative;
            overflow: hidden
        }

        .empty-state::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(200, 160, 80, .012) 3px, rgba(200, 160, 80, .012) 4px);
            pointer-events: none
        }

        .empty-orb {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        /* SVG orb animations */
        .orb-outer { animation: orb-spin-cw 10s linear infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-mid   { animation: orb-spin-ccw 7s linear infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-core  { animation: orb-breathe 2.8s ease-in-out infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-dot   { animation: orb-spin-cw 10s linear infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-dot2  { animation: orb-spin-ccw 7s linear infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-center{ animation: orb-breathe 2.8s ease-in-out infinite; transform-origin: 40px 40px; transform-box: fill-box; }
        .orb-tick  { animation: orb-tick-pulse 2.8s ease-in-out infinite; }
        .orb-tick:nth-child(2) { animation-delay: .7s; }
        .orb-tick:nth-child(3) { animation-delay: 1.4s; }
        .orb-tick:nth-child(4) { animation-delay: 2.1s; }

        @keyframes orb-spin-cw  { to { transform: rotate(360deg); } }
        @keyframes orb-spin-ccw { to { transform: rotate(-360deg); } }
        @keyframes orb-breathe  {
            0%,100% { opacity: .35; transform: scale(.88); }
            50%      { opacity: 1;   transform: scale(1.06); }
        }
        @keyframes orb-tick-pulse {
            0%,100% { opacity: .2; }
            50%      { opacity: .7; }
        }

        .empty-label {
            font-size: 10.5px;
            letter-spacing: .26em;
            text-transform: uppercase;
            color: var(--tx-3);
            font-family: 'IBM Plex Mono', monospace
        }

        .empty-desc {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12.5px;
            color: var(--tx-3);
            text-align: center;
            max-width: 260px;
            line-height: 1.7
        }

        /* Status bar */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: var(--bg-s);
            border-top: 1px solid var(--bd);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            height: 26px
        }

        .status-bar::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 0;
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, var(--ac), transparent)
        }

        .status-seg {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 9.5px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--tx-3);
            padding: 0 12px;
            border-right: 1px solid var(--bd);
            height: 100%
        }

        .status-seg:first-child {
            padding-left: 0
        }

        .status-seg:last-child {
            border-right: none;
            margin-left: auto;
            padding-right: 0
        }

        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--ok);
            box-shadow: 0 0 5px var(--ok)
        }

        .status-val {
            color: var(--tx-2)
        }

        /* History */
        .hist-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 1rem
        }

        .hist-filter-btn {
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--tx-3);
            background: none;
            border: 1px solid var(--bd);
            padding: 4px 11px;
            cursor: pointer;
            transition: all .13s
        }

        .hist-filter-btn:hover {
            color: var(--tx-2);
            border-color: var(--bd-m)
        }

        .hist-filter-btn.active {
            color: var(--ac);
            border-color: var(--ac-bd);
            background: var(--ac-bg)
        }

        .hist-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem
        }

        .hist-count {
            font-size: 10.5px;
            color: var(--tx-3);
            font-family: 'IBM Plex Mono', monospace
        }

        .clear-btn {
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--tx-3);
            background: none;
            border: 1px solid var(--bd);
            padding: 4px 9px;
            cursor: pointer;
            transition: all .12s
        }

        .clear-btn:hover {
            color: var(--danger);
            border-color: var(--danger)
        }

        .hist-list {
            display: flex;
            flex-direction: column;
            gap: 7px
        }

        .hist-empty {
            text-align: center;
            padding: 5rem 1rem;
            color: var(--tx-3);
            font-size: 12px;
            line-height: 2.8;
            white-space: pre-line;
            font-family: 'Space Grotesk', sans-serif
        }

        .hist-item {
            background: linear-gradient(135deg, var(--bg-s), var(--bg-r));
            border: 1px solid var(--bd);
            overflow: hidden;
            transition: border-color .13s
        }

        .hist-item:hover {
            border-color: var(--bd-m)
        }

        .hist-item.starred-border {
            border-color: var(--ac-bd)
        }

        .hist-item-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .65rem 1rem;
            border-bottom: 1px solid var(--bd);
            cursor: pointer;
            gap: 8px
        }

        .hist-item-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--tx)
        }

        .hist-item-right {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-shrink: 0
        }

        .hist-type {
            font-size: 9px;
            letter-spacing: .12em;
            text-transform: uppercase;
            padding: 2px 7px;

        }

        /* ── Changelog dot on new button ── */
        .new-dot {
            display: inline-block;
            width: 5px; height: 5px;

        }

            color: var(--ok) !important;
            border-color: var(--ok) !important;
        }

        /* ── CREATIVE PASS ─────────────────────────────────────────────────── */

        /* ── Brief count in header ── */
        .header-combo-count {
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: .12em;
            color: #7A7060;
            margin-top: 5px;
        }
        .header-combo-count strong {
            color: var(--ac-d);
            font-weight: 400;
        }

        /* Card header — inner top glow on loaded state */
        .card.brief-loaded .card-header {
            background: linear-gradient(180deg,
                rgba(200,160,80,.04) 0%,
                transparent 60%
            );
        }

        /* Brief headline — tighter tracking, slightly larger */
        .brief-val.headline {
            letter-spacing: .04em;
            font-size: 1.95rem;
        }

        /* Brief row — amber left bar sweeps in on hover */
        .brief-section {
            position: relative;
        }
        .brief-section::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, transparent, var(--ac-d), transparent);
            opacity: 0;
            transition: opacity .2s;
            pointer-events: none;
        }
        .brief-section:hover::before {
            opacity: 1;
        }

        /* Brief cell hover — amber top border flash */
        .brief-cell:hover {
            background: rgba(200, 160, 80, .03);
        }
        .brief-cell:hover::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, var(--ac-d), transparent);
            pointer-events: none;
        }

        /* Pillar tags — bevel top border only, slightly rounded feel */
        .pillar-tag {
            position: relative;
            transition: border-top-color .2s, color .2s;
        }
        .pillar-tag:hover {
            border-top-color: var(--ac);
            color: var(--ac-l);
        }

        /* History items — left accent bar by type */
        .hist-item {
            position: relative;
        }
        .hist-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 2px;
            opacity: .5;
        }
        .hist-item[data-type="character"]::before {
            background: var(--ac);
        }
        .hist-item[data-type="environment"]::before {
            background: var(--blue);
        }
        .hist-item:hover::before {
            opacity: 1;
        }

        /* Status bar — diamond before the app label */
        .status-brand::before {
            content: '◆ ';
            color: var(--ac-d);
            font-size: 6px;
            vertical-align: middle;
        }

        /* Card num badge — sharp diamond bullet before text */
        .card-num::before {
            content: '◆ ';
            font-size: 5px;
            color: var(--ac-d);
            vertical-align: middle;
        }

        /* Brief key label — diamond accent instead of line */
        .brief-key::before {
            content: '◆';
            display: inline-block;
            font-size: 4px;
            color: var(--ac-d);
            width: auto;
            height: auto;
            background: none;
            flex-shrink: 0;
            margin-right: 2px;
        }
        .brief-cell.locked .brief-key::before {
            color: var(--blue);
            background: none;
        }

        /* Tab bar — diamond separator between tabs */
        .tab + .tab::before {
            content: '◆';
            font-size: 4px;
            color: var(--tx-3);
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            opacity: .4;
        }

        /* Roll button — press depth */
        .gen-btn:active {
            transform: scale(.96) translateY(1px);
            box-shadow: 0 0 8px rgba(200,160,80,.2);
        }

        /* Ambient UI animations */

        /* Tab active glow */
        .tab.active {
            color: var(--ac);
            border-bottom-color: var(--ac);
            text-shadow: 0 0 10px rgba(200,160,80,.5);
        }

        /* Card hover corners */
        .card::before {
            transition: width .3s ease, height .3s ease, box-shadow .3s ease;
        }
        .card:hover::before {
            box-shadow: -3px -3px 12px rgba(200,160,80,.3);
        }
        .card:hover::after {
            box-shadow: 3px 3px 12px rgba(200,160,80,.2);
        }

        /* Brief cell — left traveling light on hover */
        .brief-cell::after {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 1.5px;
            background: linear-gradient(180deg, transparent, var(--ac), transparent);
            opacity: 0;
            transform: scaleY(0);
            transition: opacity .15s, transform .2s ease;
        }
        .brief-cell:hover::after {
            opacity: .7;
            transform: scaleY(1);
        }

        /* Brief headline — subtle style only, no glow animation */
        .brief-val.headline {
        }

        /* Pillar tags — static, no shimmer */
        .pillar-tag {
        }

        /* Status dot — simple steady glow */
        .status-dot {
        }

        /* Gen button — shimmer from background only */
        .gen-btn {
            position: relative;
        }

        /* Card header bottom gradient line — static */
        .card-header::after {
        }

        /* Lock count badge — no pulse */
        .lock-count {
        }

        /* History item — left-edge amber reveal on hover */
        .hist-item {
            position: relative;
        }
        .hist-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, transparent, var(--ac), transparent);
            opacity: 0;
            transition: opacity .2s;
        }
        .hist-item:hover::before {
            opacity: .6;
        }

        /* Brief section — ambient background scan */
        .brief-section:nth-child(odd) {
            background: rgba(255,255,255,.008);
        }

        /* Card num badge — no pulse */
        .card-num {
        }

        /* Empty state corners — drift animation */
        .empty-drift {
            font-size: 5px;
            color: var(--ac-d);
            letter-spacing: 8px;
            animation: corner-drift 3s ease-in-out infinite;
            user-select: none;
        }
        @keyframes corner-drift {
            0%, 100% { opacity: .2; letter-spacing: 8px; }
            50% { opacity: .5; letter-spacing: 12px; }
        }

        /* Header title — no ambient shimmer */
        .header-title {
        }

        /* Walkthrough tour */
        .tour-backdrop {
            position: fixed; inset: 0; z-index: 200;
            pointer-events: none;
        }
        .tour-overlay {
            position: fixed; inset: 0; z-index: 201;
            background: rgba(7,7,14,.82);
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
        }
        .tour-panel {

        }
        @keyframes tour-in {

        /* corner brackets on tour panel */
        .tour-panel::before {
            content: ''; position: absolute; top: -1px; left: -1px;

        /* Typewriter cursor */
        .tw-cursor {
            display: inline-block;
            width: 2px; height: .9em;
            background: var(--ac);
            margin-left: 3px;
            vertical-align: text-bottom;
            animation: tw-blink .6s steps(1) infinite;
        }
        @keyframes tw-blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* Reroll single field button */
        .cell-reroll {
            position: absolute;
            top: 5px; right: 5px;
            font-size: 16px;
            color: #8A7A60;
            background: none; border: none;
            cursor: pointer; opacity: 0;
            transition: opacity .13s, color .13s;
            padding: 3px 6px;
            line-height: 1;
            font-family: 'IBM Plex Mono', monospace;
        }

    <script>
        (function () {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');

            let particles = [];
            let lastFrame = 0;
            const INTERVAL = 1000 / 30; // 30fps cap

            function resize() {
                canvas.width  = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function makeParticle(fromTop) {
                const bright = Math.random() > 0.85;
                const sz = bright ? Math.random() * 2.5 + 2.5 : Math.random() * 2 + 1;
                const col = bright
                    ? [240, 210, 120]
                    : Math.random() < 0.6 ? [200, 160, 80] : [160, 120, 50];
                return {
                    x:        Math.random() * canvas.width,
                    y:        fromTop ? -sz * 6 : Math.random() * canvas.height,
                    sz,
                    speed:    Math.random() * 0.28 + 0.06,
                    alpha:    bright ? Math.random() * 0.28 + 0.18 : Math.random() * 0.10 + 0.04,
                    alphaMax: bright ? 0.46 : 0.18,
                    pulse:    bright ? Math.random() * Math.PI * 2 : -1,
                    pulseSpd: 0.012 + Math.random() * 0.008,
                    rot:      Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * (bright ? 0.006 : 0.003),
                    drift:    (Math.random() - 0.5) * 0.06,
                    glow:     bright,
                    // Pre-built color strings — no template literals per frame
                    fillStyle:  `rgb(${col[0]},${col[1]},${col[2]})`,
                    glowInner:  `rgba(${col[0]},${col[1]},${col[2]},0.18)`,
                    glowOuter:  `rgba(${col[0]},${col[1]},${col[2]},0)`,
                };
            }

            function seed() {
                particles = [];
                const count = Math.floor(canvas.width / 18);
                for (let i = 0; i < count; i++) particles.push(makeParticle(false));
            }

            function drawDiamond(x, y, sz, rot) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rot);
                ctx.beginPath();
                ctx.moveTo(0, -sz);
                ctx.lineTo(sz, 0);
                ctx.lineTo(0,  sz);
                ctx.lineTo(-sz, 0);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            function draw(ts) {
                requestAnimationFrame(draw);
                if (ts - lastFrame < INTERVAL) return;
                lastFrame = ts;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (const p of particles) {
                    p.y   += p.speed;
                    p.x   += p.drift;
                    p.rot += p.rotSpeed;

                    if (p.y > canvas.height + p.sz * 6) {
                        Object.assign(p, makeParticle(true));
                    }

                    let a = p.alpha;
                    if (p.pulse >= 0) {
                        p.pulse += p.pulseSpd;
                        a = p.alpha + Math.sin(p.pulse) * (p.alphaMax - p.alpha) * 0.6;
                    }

                    ctx.globalAlpha = Math.min(a, p.alphaMax);

                    if (p.glow) {
                        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.sz * 3.5);
                        g.addColorStop(0, p.glowInner);
                        g.addColorStop(1, p.glowOuter);
                        ctx.fillStyle = g;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.sz * 3.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = Math.min(a, p.alphaMax);
                    }

                    ctx.fillStyle = p.fillStyle;
                    drawDiamond(p.x, p.y, p.sz, p.rot);
                }

                ctx.globalAlpha = 1;
            }

            resize();
            seed();
            window.addEventListener('resize', () => { resize(); seed(); });
            requestAnimationFrame(draw);
        })();
    </script>

        // Pick respecting pinned entries — if pins exist for this bank key, pick from those only

        /* ── Compact share URL encoding ──
           Format: #b=c.i0.i1.i2... (character) or #b=e.i0.i1.i2... (environment)
           Each number is the index of that value in its word bank.
           Multi-pick fields (colors, materials) use two consecutive indices.
           Falls back gracefully if a value isn't found (index = -1 → kept as-is on decode). */
        const CHAR_FIELDS  = ['job','race','genre','theme','culture','pillar1','pillar2','pillar3','shape','colors','materials','prop','worn'];
        const ENV_FIELDS   = ['buildingType','function','biome','genre','theme','culture','pillar1','pillar2','pillar3','shape','condition','scale','materials','color','hero','envAdj','envNoun'];
        const MULTI_FIELDS = new Set(['colors','materials']); // stored as "a, b" — encode as two indices

        function fieldBank(fk) {
            const map = {
                job:'jobs', race:'races', genre:'genres', theme:'themes', culture:'cultures',
                pillar1:'pillars', pillar2:'pillars', pillar3:'pillars', shape:'shapes',
                colors:'colors', materials:'materials', prop:'props', worn:'worn',
                buildingType:'buildingTypes', function:'envFunctions', biome:'biomes',
                condition:'conditions', scale:'scales', color:'colorScripts',
                hero:'heroProps', envAdj:'envAdj', envNoun:'envNouns',
            };
            return W[map[fk]] || [];
        }

        function encodeBrief(d) {
            try {
                const type = d.job ? 'c' : 'e';
                const fields = type === 'c' ? CHAR_FIELDS : ENV_FIELDS;
                const parts = [type];
                for (const fk of fields) {
                    const bank = fieldBank(fk);
                    const val = d[fk] || '';
                    if (MULTI_FIELDS.has(fk)) {
                        const [a, b] = val.split(', ');
                        parts.push(bank.indexOf(a), bank.indexOf(b));
                    } else {
                        parts.push(bank.indexOf(val));
                    }
                }
                return parts.join('.');
            } catch { return null; }
        }

        function decodeBrief(s) {
            try {
                // Legacy format: base64 JSON
                if (!s.startsWith('c.') && !s.startsWith('e.')) {
                    const d = JSON.parse(decodeURIComponent(atob(s)));
                    if (d && d.pillars && !d.pillar1) {
                        const parts = d.pillars.split(', ');
                        d.pillar1 = parts[0] || ''; d.pillar2 = parts[1] || ''; d.pillar3 = parts[2] || '';
                        delete d.pillars;
                    }
                    return d;
                }
                // New compact format
                const parts = s.split('.');
                const type = parts[0];
                const fields = type === 'c' ? CHAR_FIELDS : ENV_FIELDS;
                const d = {};
                let i = 1;
                for (const fk of fields) {
                    const bank = fieldBank(fk);
                    if (MULTI_FIELDS.has(fk)) {
                        const a = bank[parseInt(parts[i++])];
                        const b = bank[parseInt(parts[i++])];
                        d[fk] = [a, b].filter(Boolean).join(', ');
                    } else {
                        const idx = parseInt(parts[i++]);
                        d[fk] = idx >= 0 ? (bank[idx] || '') : '';

                return d;

            const total = c + e;
            if (total >= 1e15) return (total / 1e15).toFixed(1) + 'Q';
            if (total >= 1e12) return (total / 1e12).toFixed(1) + 'T';
            if (total >= 1e9) return (total / 1e9).toFixed(1) + 'B';
            if (total >= 1e6) return (total / 1e6).toFixed(1) + 'M';

        function CustomWords({ onClose }) {
            const [activeBank, setActiveBank] = useState("jobs");
            const [customData, setCustomData] = useState(loadCustom);
            const [pinData, setPinData] = useState(loadPins);
            const [input, setInput] = useState("");

            const bankEntries = W[activeBank] || [];
            const userEntries = customData[activeBank] || [];
            const pins = pinData[activeBank] || [];
            const allEntries = [
                ...pins.map(e => ({ val: e, pinned: true, user: userEntries.includes(e) })),
                ...userEntries.filter(e => !pins.includes(e)).map(e => ({ val: e, pinned: false, user: true })),
                ...bankEntries.filter(e => !pins.includes(e) && !userEntries.includes(e)).map(e => ({ val: e, pinned: false, user: false })),
            ];

            function togglePin(val) {
                const cur = pinData[activeBank] || [];
                const next = cur.includes(val) ? cur.filter(e => e !== val) : [...cur, val];
                const nextData = { ...pinData, [activeBank]: next };
                setPinData(nextData);
                savePins(nextData);
                // Update live _pins reference
                _pins[activeBank] = next;
            }
            function addEntry() {
                const val = input.trim();
                if (!val) return;
                const next = { ...customData, [activeBank]: [...(customData[activeBank] || []), val] };
                setCustomData(next);
                saveCustom(next);
                if (W[activeBank]) W[activeBank] = [...W[activeBank], val];
                setInput("");
            }
            function removeEntry(val) {
                const next = { ...customData, [activeBank]: (customData[activeBank] || []).filter(e => e !== val) };
                setCustomData(next);
                saveCustom(next);
                if (W[activeBank]) W[activeBank] = W[activeBank].filter(e => e !== val);
                // Also unpin if pinned
                if ((pinData[activeBank] || []).includes(val)) togglePin(val);
            }

                const next = { ...pinData, [activeBank]: [] };

                savePins(next);
                _pins[activeBank] = [];

            const starred = history.filter(h => h.starred).length;
            const last = history[0];
            const [, forceUpdate] = useState(0);
            useEffect(() => {
                const iv = setInterval(() => forceUpdate(n => n + 1), 30000);
                return () => clearInterval(iv);
            }, []);
            function timeAgo(ts) {
                const s = Math.floor((Date.now() - ts) / 1000);
                if (s < 60) return `${s}s ago`;
                if (s < 3600) return `${Math.floor(s/60)}m ago`;
                return `${Math.floor(s/3600)}h ago`;
            }
            return (
                <div className="status-bar">
                    <div className="status-seg">
                        <div className="status-dot" />
                        <span className="status-val">{total > 0 ? "active" : "ready"}</span>
                    </div>
                    <div className="status-seg"><span>session</span><span className="status-val">{total} brief{total !== 1 ? "s" : ""}</span></div>
                    {last && <div className="status-seg"><span>last</span><span className="status-val">{last.type} · {timeAgo(last.ts)}</span></div>}
                    {starred > 0 && <div className="status-seg"><span>★</span><span className="status-val">{starred}</span></div>}
                    <div className="status-seg" style={{marginLeft:"auto"}}><button className={`sound-btn${soundOn ? " on" : ""}`} onClick={onSoundToggle}>{soundOn ? "♪ sfx on" : "♪ sfx off"}</button></div>
                </div>
            );
        }

        /* App  */
        function App() {
            const [loaded, setLoaded] = useState(false);
            const [tour, setTour] = useState(false);
            const [whatsNew, setWhatsNew] = useState(false);
            const [customWords, setCustomWords] = useState(false);
            const [tab, setTab] = useState("generate");
            const [results, setResults] = useState({ char: null, env: null });
            const [locks, setLocks] = useState({ char: {}, env: {} });
            const [history, setHistory] = useState([]);
            const [starredBriefs, setStarredBriefs] = useState([]);
            const [histFilter, setHistFilter] = useState("all");
            const [copied, setCopied] = useState({ char: false, env: false });
            const [lastHistId, setLastHistId] = useState({ char: null, env: null });
            const [undoStack, setUndoStack] = useState({ char: null, env: null });
            const [soundOn, setSoundOn] = useState(SFX.isOn());
            const [shareCopied, setShareCopied] = useState({ char: false, env: false });
            const [picker, setPicker] = useState(null);

            useEffect(() => {
                const s = store.get(STAR_KEY); if (s) { try { setStarredBriefs(JSON.parse(s)); } catch { } }
                const h = store.get(HIST_KEY); if (h) { try { setHistory(JSON.parse(h)); } catch { } }
                // Inject saved custom entries + load pins
                try { const cd = JSON.parse(store.get(CUSTOM_KEY) || '{}'); Object.keys(cd).forEach(k => { if (W[k] && cd[k].length) W[k] = [...W[k], ...cd[k]]; }); } catch(e) {}
                try { const pd = JSON.parse(store.get(PIN_KEY) || '{}'); Object.keys(pd).forEach(k => { _pins[k] = pd[k]; }); } catch(e) {}
                // Show whats new if not seen this version
                if (store.get('wn_seen') !== WHATS_NEW_VERSION) setWhatsNew(true);
                setLoaded(true);
            }, []);
            useEffect(() => { if (loaded) store.set(STAR_KEY, JSON.stringify(starredBriefs)); }, [starredBriefs, loaded]);
            useEffect(() => { if (loaded) store.set(HIST_KEY, JSON.stringify(history.slice(0, 100))); }, [history, loaded]);

            // Keyboard shortcuts
            useEffect(() => {
                function onKey(e) {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (e.key === 'r' || e.key === 'R') { gen('char'); gen('env'); }
                    if (e.key === 'u' || e.key === 'U') { handleUndo('char'); handleUndo('env'); }
                    if (e.key === 'c' || e.key === 'C') handleCombine();
                    if (e.key === 's' || e.key === 'S') {
                        const id = lastHistId.char || lastHistId.env;
                        if (id) starHistoryItem(id);
                    }
                }
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [results, locks, undoStack, lastHistId]);

            function toggleLock(cardKey, fk, val) {
                SFX.play('lock');
                setLocks(prev => { const c = { ...prev[cardKey] }; if (c[fk]) delete c[fk]; else c[fk] = val; return { ...prev, [cardKey]: c }; });
            }
            function addToHistory(type, name, data, cardKey) {
                const id = Date.now();
                setHistory(h => [{ id, ts: id, type, name, data, starred: false, note: "" }, ...h].slice(0, 100));
                if (cardKey) setLastHistId(l => ({ ...l, [cardKey]: id }));
            }
            function starHistoryItem(id) {
                SFX.play('star');
                setHistory(h => h.map(i => {
                    if (i.id !== id) return i;
                    const ns = !i.starred;
                    if (ns) setStarredBriefs(sb => sb.find(s => s.id === id) ? sb : [{ ...i, starred: true }, ...sb]);
                    else setStarredBriefs(sb => sb.filter(s => s.id !== id));
                    return { ...i, starred: ns };
                }));
            }
            function noteHistoryItem(id, note) {
                setHistory(h => h.map(i => i.id === id ? { ...i, note } : i));
            }
            function unstar(id) { setStarredBriefs(sb => sb.filter(s => s.id !== id)); setHistory(h => h.map(i => i.id === id ? { ...i, starred: false } : i)); }

            function rerollField(cardKey, fk) {
                const W_map = {
                    job: () => pickPinned("jobs", W.jobs), race: () => pickPinned("races", W.races),
                    genre: () => pickPinned("genres", W.genres), theme: () => pickPinned("themes", W.themes),
                    culture: () => pickPinned("cultures", W.cultures),
                    pillar1: () => pick(W.pillars), pillar2: () => pick(W.pillars), pillar3: () => pick(W.pillars),
                    shape: () => pickPinned("shapes", W.shapes), colors: () => picksPinned("colors", W.colors, 2).join(", "),
                    materials: () => picksPinned("materials", W.materials, 2).join(", "), prop: () => pickPinned("props", W.props),
                    worn: () => pickPinned("worn", W.worn), buildingType: () => pickPinned("buildingTypes", W.buildingTypes),
                    function: () => pickPinned("envFunctions", W.envFunctions), biome: () => pickPinned("biomes", W.biomes),
                    condition: () => pickPinned("conditions", W.conditions), scale: () => pickPinned("scales", W.scales),
                    color: () => pickPinned("colorScripts", W.colorScripts), hero: () => pickPinned("heroProps", W.heroProps),
                };
                const fn = W_map[fk];
                if (!fn) return;
                SFX.play('roll');
                setResults(r => ({ ...r, [cardKey]: { ...r[cardKey], [fk]: fn() } }));
            }

            function gen(key) {
                SFX.play('roll');
                const prev = results[key];
                const d = key === "char" ? genChar(locks[key]) : genEnv(locks[key]);
                const type = key === "char" ? "character" : "environment";
                const histName = d._histName || d.job || d.name;
                setUndoStack(u => ({ ...u, [key]: prev }));
                setResults(r => ({ ...r, [key]: d }));
                addToHistory(type, histName, d, key);
            }

            function handleUndo(key) {
                const prev = undoStack[key];
                if (!prev) return;
                setResults(r => ({ ...r, [key]: prev }));
                setUndoStack(u => ({ ...u, [key]: null }));
            }

            function handleCombine() {
                SFX.play('roll');
                const char = genChar(locks.char);
                const env = genEnv(locks.env);
                const charHistName = char._histName || char.job;
                const envHistName = env._histName || env.name;
                setResults({ char, env });
                setUndoStack({ char: results.char, env: results.env });
                addToHistory("character", charHistName, char, "char");
                addToHistory("environment", envHistName, env, "env");
            }

            function handleCopy(key, type) {
                const d = results[key]; if (!d) return;
                copyBrief(type, d);
                setCopied(c => ({ ...c, [key]: true }));
                setTimeout(() => setCopied(c => ({ ...c, [key]: false })), 1500);
            }

            function handleSoundToggle() {
                const on = SFX.toggle();
                setSoundOn(on);
                if (on) SFX.play('star');
            }
            function handleShare(key) {
                const d = results[key]; if (!d) return;
                const url = getShareURL(d);
                if (url) navigator.clipboard.writeText(url).catch(() => {});
                setShareCopied(s => ({ ...s, [key]: true }));
                setTimeout(() => setShareCopied(s => ({ ...s, [key]: false })), 2000);
            }
            function handlePickField(cardKey, fk, label) {
                const bankKey = FIELD_BANK_MAP[fk];
                if (!bankKey || !W[bankKey]) return;
                setPicker({ fk, label, cardKey, options: [...W[bankKey]] });
            }
            function handlePickSelect(val) {
                if (!picker) return;
                const { fk, cardKey } = picker;
                setResults(r => ({ ...r, [cardKey]: { ...r[cardKey], [fk]: val } }));
                setLocks(prev => { const c = { ...prev[cardKey] }; c[fk] = val; return { ...prev, [cardKey]: c }; });
                setPicker(null);
            }
            // On load, check for shared brief in URL
            React.useEffect(() => {
                const hash = window.location.hash;
                let encoded = null;
                if (hash.startsWith('#b=')) encoded = hash.slice(3);
                else if (hash.startsWith('#brief=')) encoded = hash.slice(7);
                if (encoded) {
                    const d = decodeBrief(encoded);
                    if (d && d.job) setResults(r => ({ ...r, char: d }));
                    else if (d && d.buildingType) setResults(r => ({ ...r, env: d }));
                    window.history.replaceState(null, '', window.location.pathname);
                }
            }, []);

            const CARDS = [
                { key: "char", type: "character", num: "01", title: "Character", badge: "char brief", desc: "role, race, genre, theme, culture, shape, colors, materials", BC: CharBrief },
                { key: "env", type: "environment", num: "02", title: "Environment", badge: "env brief", desc: "role, biome, genre, culture, shape, materials, hero prop", BC: EnvBrief },
            ];
            const filteredHist = history.filter(h => {
                if (histFilter === "all") return true;
                if (histFilter === "starred") return h.starred;
                return h.type === histFilter;
            });

            if (!loaded) return <LoadingScreen onDone={() => setLoaded(true)} />;

            return (
                <>
                    {tour && <Tour onClose={() => setTour(false)} />}
                    {whatsNew && <WhatsNew onClose={() => setWhatsNew(false)} />}
                    {customWords && <CustomWords onClose={() => setCustomWords(false)} />}
                    {picker && <FieldPicker label={picker.label} options={picker.options} onSelect={handlePickSelect} onClose={() => setPicker(null)} />}
                    <StatusBar tab={tab} history={history} soundOn={soundOn} onSoundToggle={handleSoundToggle} />
                    <div className="app">
                        <div className="header">
                            <div style={{display:"flex",alignItems:"center",gap:"1rem"}}>
                                <svg width="50" height="50" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg" style={{flexShrink:0}}>
                                    <polygon points="26,2 50,26 26,50 2,26" fill="none" stroke="#C8A050" strokeWidth="1.5"/>
                                    <polygon points="26,9 43,26 26,43 9,26" fill="none" stroke="#C8A050" strokeWidth="1" opacity="0.45"/>
                                    <polygon points="26,16 36,26 26,36 16,26" fill="none" stroke="#C8A050" strokeWidth="1" opacity="0.28"/>
                                    <line x1="26" y1="2" x2="26" y2="50" stroke="#7A6028" strokeWidth="0.5" opacity="0.35"/>
                                    <line x1="2" y1="26" x2="50" y2="26" stroke="#7A6028" strokeWidth="0.5" opacity="0.35"/>
                                    <line x1="6" y1="6" x2="46" y2="46" stroke="#7A6028" strokeWidth="0.5" opacity="0.2"/>
                                    <line x1="46" y1="6" x2="6" y2="46" stroke="#7A6028" strokeWidth="0.5" opacity="0.2"/>
                                    <polygon points="26,21 31,26 26,31 21,26" fill="#C8A050"/>
                                    <circle cx="26" cy="2" r="1.8" fill="#C8A050"/>
                                    <circle cx="50" cy="26" r="1.8" fill="#C8A050"/>
                                    <circle cx="26" cy="50" r="1.8" fill="#C8A050"/>
                                    <circle cx="2" cy="26" r="1.8" fill="#C8A050"/>
                                    <circle cx="9" cy="9" r="1.2" fill="#7A6028" opacity="0.6"/>
                                    <circle cx="43" cy="9" r="1.2" fill="#7A6028" opacity="0.6"/>
                                    <circle cx="43" cy="43" r="1.2" fill="#7A6028" opacity="0.6"/>
                                    <circle cx="9" cy="43" r="1.2" fill="#7A6028" opacity="0.6"/>
                                </svg>
                                <div>
                                    <div className="header-eyebrow">concept art studio</div>
                                    <div className="header-title">Vestige <span>/ brief gen</span></div>
                                    <div className="header-combo-count">◆ <strong>{getBriefCombinations()}</strong> possible combinations</div>
                                </div>
                            </div>
                            <div style={{display:"flex",gap:6,alignSelf:"flex-end",marginBottom:"4px",flexWrap:"wrap"}}>
                                <button className="tour-btn" onClick={() => setCustomWords(true)}>◆ edit banks</button>
                                <button className="tour-btn" onClick={() => setWhatsNew(true)}>★ new{store.get('wn_seen') !== WHATS_NEW_VERSION && <span className="new-dot" />}</button>
                                <button className="tour-btn" onClick={() => setTour(true)}>? how to use</button>
                            </div>
                        </div>

                        <div className="tab-bar">
                            <button className={`tab${tab === "generate" ? " active" : ""}`} onClick={() => setTab("generate")}>generate</button>
                            <button className={`tab${tab === "starred" ? " active" : ""}`} onClick={() => setTab("starred")}>starred{starredBriefs.length ? ` (${starredBriefs.length})` : ""}</button>
                            <button className={`tab${tab === "history" ? " active" : ""}`} onClick={() => setTab("history")}>history{history.length ? ` (${history.length})` : ""}</button>
                        </div>

                        {tab === "generate" && (
                            <div>
                                <div style={{display:"flex",gap:8,marginBottom:"1rem",flexWrap:"wrap"}}>
                                    <button className="gen-btn" onClick={handleCombine}>◆ combine both ↻</button>
                                    <button className="action-btn" onClick={() => { handleUndo('char'); handleUndo('env'); }} style={{opacity: (undoStack.char||undoStack.env) ? 1 : .35}}>↩ undo last roll</button>
                                </div>

                                <div className="cards">
                                    {CARDS.map(c => {
                                        const d = results[c.key], cl = locks[c.key], lc = Object.keys(cl).length;
                                        const histId = lastHistId[c.key];
                                        const isStarred = histId ? !!history.find(h => h.id === histId)?.starred : false;
                                        const hasUndo = !!undoStack[c.key];
                                        return (
                                            <div key={c.key} className={`card${d ? " brief-loaded" : ""}`}>
                                                <div className="card-header">
                                                    <div className="card-left">
                                                        <span className="card-num">{c.num}</span>
                                                        <span className="card-title">{c.title}</span>
                                                        {lc > 0 && <span className="lock-count">{lc} locked</span>}
                                                    </div>
                                                    <div className="card-actions">
                                                        {d && <button className={`star-btn${isStarred ? " on" : ""}`} onClick={() => histId && starHistoryItem(histId)}>{isStarred ? "★" : "☆"}</button>}
                                                        {d && <button className={`action-btn${copied[c.key] ? " ok" : ""}`} onClick={() => handleCopy(c.key, c.type)}>{copied[c.key] ? "copied ✓" : "copy brief"}</button>}
                                                    {d && <button className={`action-btn${shareCopied[c.key] ? " share-copied" : ""}`} onClick={() => handleShare(c.key)}>{shareCopied[c.key] ? "link copied ✓" : "share ↗"}</button>}
                                                        {hasUndo && <button className="undo-btn" onClick={() => handleUndo(c.key)}>↩ undo</button>}
                                                        {lc > 0 && <button className="action-btn" onClick={() => setLocks(l => ({ ...l, [c.key]: {} }))}>clear locks</button>}
                                                        <button className="gen-btn" onClick={() => gen(c.key)}>roll brief ↻</button>
                                                    </div>
                                                </div>
                                                {d
                                                    ? <c.BC d={d} locks={cl}
                                                        onToggle={(fk, val) => toggleLock(c.key, fk, val)}
                                                        onReroll={(fk) => rerollField(c.key, fk)}
                                                        onPick={(fk, label) => handlePickField(c.key, fk, label)}
                                                      />
                                                    : <EmptyState desc={c.desc} />
                                                }
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {tab === "starred" && (
                            <div>
                                {starredBriefs.length === 0
                                    ? <div className="hist-empty">nothing starred yet.{"\n"}star any brief and it will persist here.</div>
                                    : <div className="hist-list">{starredBriefs.map(item => <HistItem key={item.id} item={{ ...item, starred: true }} onStar={() => unstar(item.id)} onNote={noteHistoryItem} />)}</div>
                                }
                            </div>
                        )}

                        {tab === "history" && (
                            <div>
                                <div className="hist-filters">
                                    {["all", "character", "environment", "starred"].map(f => (
                                        <button key={f} className={`hist-filter-btn${histFilter === f ? " active" : ""}`} onClick={() => setHistFilter(f)}>{f}</button>
                                    ))}
                                </div>
                                {filteredHist.length === 0
                                    ? <div className="hist-empty">{history.length === 0 ? "nothing here yet.\nroll some briefs and they will show up." : "no briefs match this filter."}</div>
                                    : <>
                                        <div className="hist-toolbar">
                                            <span className="hist-count">{filteredHist.length} brief{filteredHist.length !== 1 ? "s" : ""}</span>
                                            <button className="clear-btn" onClick={() => { setHistory([]); store.set(HIST_KEY, '[]'); }}>clear history</button>
                                        </div>
                                        <div className="hist-list">{filteredHist.map(item => <HistItem key={item.id} item={item} onStar={starHistoryItem} onNote={noteHistoryItem} />)}</div>
                                    </>
                                }
                            </div>
                        )}
                    </div>
                        <footer className="site-footer">
                            <div className="footer-inner">
                                <div className="footer-credit">
                                    <div className="footer-credit-by">created by</div>
                                    <div className="footer-credit-name">Noble Jefferies</div>
                                    <div className="footer-credit-title">Artist / Concept Artist</div>
                                </div>
                                <div className="footer-links">
                                    <a className="footer-link" href="https://www.instagram.com/mr.miracle.art/" target="_blank" rel="noopener noreferrer">Instagram</a>
                                    <a className="footer-link" href="https://www.artstation.com/mr_miracle" target="_blank" rel="noopener noreferrer">ArtStation</a>
                                    <a className="footer-link" href="https://miracleworks.godaddysites.com/" target="_blank" rel="noopener noreferrer">Portfolio</a>
                                    <a className="footer-link" href="https://noblesenvironmentdesignportfol.godaddysites.com/" target="_blank" rel="noopener noreferrer">Env Portfolio</a>
                                </div>
                            </div>
                            <div className="footer-bottom">
                                <span className="footer-copy">open source / free forever / runs offline</span>
                                <span className="footer-version">concept vestigue / v{WHATS_NEW_VERSION}</span>
                            </div>
                        </footer>
                </>
            );
        }
                ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
